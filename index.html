ally to the senses","ex":"Her grating laugh echoed annoyingly through the quiet library."},{"word":"gregarious","def":"adj. fond of company; sociable and outgoing","ex":"His gregarious nature made him the center of every gathering."},{"word":"grievous","def":"adj. very serious, severe, or causing great suffering","ex":"The surgeon's grievous error nearly cost the patient her life."},{"word":"grouse","def":"v. to complain or grumble; n. a complaint","ex":"The employees groused about the new policy all week long."},{"word":"grovel","def":"v. to behave obsequiously or abjectly to win favor or forgiveness.","ex":"He refused to grovel before the tyrant, even to save his own position."},{"word":"guile","def":"n. sly cunning and deceit used to achieve an aim","ex":"She won the contract through sheer guile rather than honest merit."},{"word":"guzzle","def":"v. to consume something greedily and rapidly, especially drink.","ex":"After the race, the runners began to guzzle water straight from the bottles."},{"word":"hackneyed","def":"adj. overused and trite; lacking freshness or originality.","ex":"The screenplay relied on hackneyed plot twists every viewer saw coming."},{"word":"hagiographic","def":"adj. excessively flattering or idealizing in describing someone.","ex":"The hagiographic biography ignored every flaw and failure of its subject."},{"word":"halcyon","def":"adj. denoting a peaceful, happy, and prosperous period","ex":"He fondly recalled the halcyon days of his carefree childhood."},{"word":"halfhearted","def":"adj. showing little enthusiasm, effort, or commitment.","ex":"His halfhearted apology convinced no one that he truly felt sorry."},{"word":"hallmark","def":"n. a distinctive feature or mark of authenticity or quality","ex":"Meticulous craftsmanship is the hallmark of her furniture designs."},{"word":"hallow","def":"v. to make holy or treat as sacred; to honor greatly.","ex":"Pilgrims came to hallow the ground where the saint had reportedly died."},{"word":"handwringing","def":"n. an excessive, anxious, or theatrical show of distress or worry","ex":"The board's constant handwringing over risk produced plenty of worry but no decisions."},{"word":"hangdog","def":"adj. having a dejected, guilty, or shamefaced appearance.","ex":"He slunk in with a hangdog look, knowing he had broken the vase."},{"word":"hanker","def":"v. to have a strong, persistent longing or craving.","ex":"After years abroad, she began to hanker for her mother's home cooking."},{"word":"hapless","def":"adj. unlucky and deserving of pity","ex":"The hapless traveler missed his flight and lost his luggage too."},{"word":"harangue","def":"n. a long, aggressive, scolding speech; v. to deliver such a speech.","ex":"The coach launched into a furious harangue about the team's laziness."},{"word":"hardy","def":"adj. robust and capable of enduring difficult or harsh conditions","ex":"These hardy plants survive even the coldest mountain winters."},{"word":"harrow","def":"v. to cause great distress or torment; to break up soil","ex":"The harrowing testimony left the entire courtroom shaken."},{"word":"hauteur","def":"n. haughty, arrogant, or disdainful manner or attitude.","ex":"She greeted the staff with a chilly hauteur that made everyone uneasy."},{"word":"haven","def":"n. a place of safety, shelter, or refuge","ex":"The quiet cabin became a haven from the chaos of the city."},{"word":"hearken","def":"v. to listen attentively; to pay heed.","ex":"The wise ruler would hearken to the counsel of even his humblest advisers."},{"word":"hearten","def":"v. to encourage, cheer, or give renewed confidence.","ex":"The team's late comeback heartened the fans who had nearly left."},{"word":"heartrending","def":"adj. causing intense grief, sorrow, or anguish.","ex":"The documentary's heartrending images of famine left the audience in tears."},{"word":"heckle","def":"v. to interrupt a speaker or performer with jeers and taunts.","ex":"Protesters tried to heckle the candidate throughout her entire address."},{"word":"hedge","def":"v. to avoid committing oneself; to limit risk; n. a protective barrier","ex":"When asked directly, the politician hedged and gave no clear answer."},{"word":"hedonist","def":"n. a person devoted to the pursuit of pleasure and self-indulgence","ex":"A confirmed hedonist, he spent his fortune on lavish feasts and travel."},{"word":"hegemony","def":"n. leadership or dominance, especially of one state or group over others","ex":"The empire maintained its hegemony over the region for two centuries."},{"word":"hermetic","def":"adj. completely sealed and airtight; isolated from outside influence","ex":"The samples were stored in hermetic containers to prevent contamination."},{"word":"heterodox","def":"adj. not conforming to accepted or orthodox beliefs.","ex":"His heterodox views on monetary policy scandalized the conservative economists."},{"word":"heterogeneous","def":"adj. diverse in character; composed of dissimilar elements","ex":"The city's heterogeneous population speaks dozens of different languages."},{"word":"hew","def":"v. to chop or cut with a tool; to conform or adhere strictly","ex":"The judge vowed to hew closely to the letter of the law."},{"word":"hidebound","def":"adj. rigidly conventional and resistant to new ideas.","ex":"The hidebound bureaucracy rejected every innovation that threatened its routines."},{"word":"hierarchy","def":"n. a system ranking people or things by relative status or authority","ex":"Promotion within the rigid corporate hierarchy took decades of service."},{"word":"histrionic","def":"adj. excessively theatrical, dramatic, or attention-seeking.","ex":"Her histrionic outburst over a minor delay embarrassed everyone in line."},{"word":"hoary","def":"adj. gray or white with age; ancient and overfamiliar.","ex":"The professor repeated that hoary joke he had told for forty years."},{"word":"hobble","def":"v. to walk awkwardly or with difficulty; to hamper or impede.","ex":"The new regulations could hobble small businesses already struggling to survive."},{"word":"hodgepodge","def":"n. a confused or disorderly mixture of unrelated things.","ex":"The attic held a hodgepodge of broken furniture, old toys, and faded photos."},{"word":"homage","def":"n. special honor or respect shown publicly","ex":"The film pays homage to the classic westerns of the 1950s."},{"word":"homogeneous","def":"adj. of the same kind; uniform in composition throughout","ex":"The small town remained culturally homogeneous for generations."},{"word":"homogenize","def":"v. to make uniform or similar throughout.","ex":"Mass media tends to homogenize culture, erasing distinctive local traditions."},{"word":"hoodwink","def":"v. to deceive or trick someone.","ex":"The swindler hoodwinked elderly investors into buying nonexistent properties."},{"word":"hortative","def":"adj. urging or encouraging a course of action; exhortatory.","ex":"The general's hortative speech spurred the weary soldiers to fight on."},{"word":"hotly","def":"adv. in an intense, passionate, or angry manner","ex":"The proposal was hotly debated until well past midnight."},{"word":"husband","def":"v. to use or manage resources carefully and economically","ex":"Settlers learned to husband their scarce water through the long drought."},{"word":"hyperbole","def":"n. deliberate, obvious exaggeration used for effect and not meant to be taken literally","ex":"Calling the line \"a mile long\" was hyperbole; only six people were waiting."},{"word":"iconoclast","def":"n. one who attacks cherished beliefs, traditions, or institutions.","ex":"As an iconoclast, she delighted in challenging the dogmas her colleagues revered."},{"word":"idiosyncrasy","def":"n. a peculiar habit, mannerism, or characteristic unique to a person.","ex":"Tapping his pen three times before writing was a harmless idiosyncrasy of his."},{"word":"idolatrize","def":"v. to worship or admire excessively, as an idol.","ex":"Teenagers tend to idolatrize celebrities whose flaws they completely overlook."},{"word":"idolatry","def":"n. excessive admiration or worship of someone or something","ex":"The fans' idolatry of the singer bordered on religious devotion."},{"word":"idyllic","def":"adj. extremely peaceful, happy, and picturesque","ex":"They spent an idyllic week in a cottage by the sparkling lake."},{"word":"ignoble","def":"adj. dishonorable in character or purpose; lowly","ex":"He abandoned his friends for the ignoble goal of personal gain."},{"word":"ignominious","def":"adj. deserving or causing public disgrace or shame; humiliating","ex":"The team suffered an ignominious defeat, losing by forty points at home."},{"word":"ignominy","def":"n. public shame, disgrace, or humiliation.","ex":"The disgraced official resigned, unable to bear the ignominy of the scandal."},{"word":"illiberality","def":"n. narrow-mindedness, intolerance, or stinginess","ex":"The regime's illiberality crushed any hint of dissenting thought."},{"word":"imbibe","def":"v. to drink; to absorb or take in ideas or knowledge.","ex":"As a student she would imbibe new theories with insatiable enthusiasm."},{"word":"imbroglio","def":"n. a confused, complicated, or embarrassing situation.","ex":"The diplomatic imbroglio took months of negotiation to finally untangle."},{"word":"imbue","def":"v. to fill or inspire deeply with a quality or feeling","ex":"Her mentor sought to imbue students with a love of learning."},{"word":"immanent","def":"adj. existing or operating within; inherent.","ex":"Some philosophers see beauty as immanent in nature rather than imposed on it."},{"word":"imminent","def":"adj. about to happen; impending","ex":"Dark clouds signaled that a violent storm was imminent."},{"word":"immure","def":"v. to enclose or imprison within walls; to confine.","ex":"The monk chose to immure himself in a remote cell for years of study."},{"word":"immutable","def":"adj. unchanging over time; incapable of being altered","ex":"The laws of physics are treated as immutable constants."},{"word":"impair","def":"v. to weaken or damage the function or quality of something","ex":"Lack of sleep can seriously impair your ability to concentrate."},{"word":"impartial","def":"adj. treating all sides fairly; not favoring one over another","ex":"A judge must remain impartial regardless of personal feelings."},{"word":"impasse","def":"n. a deadlock or situation in which no progress is possible","ex":"Negotiations reached an impasse, and both sides walked away."},{"word":"impassive","def":"adj. showing no emotion or feeling; expressionless.","ex":"The witness remained impassive even as the gruesome photos were displayed."},{"word":"impecunious","def":"adj. having little or no money; poor.","ex":"The impecunious artist could barely afford paint, let alone a studio."},{"word":"impede","def":"v. to delay, obstruct, or hinder progress","ex":"Fallen trees impeded the rescue team's path to the village."},{"word":"impenitent","def":"adj. not feeling shame or regret; unrepentant.","ex":"The thief remained impenitent, insisting his victims deserved to be robbed."},{"word":"imperious","def":"adj. arrogantly domineering and commanding","ex":"With an imperious wave, the duchess dismissed the servants."},{"word":"imperishable","def":"adj. enduring forever; not subject to decay or destruction.","ex":"Her imperishable reputation for honesty outlasted the rivals who slandered her."},{"word":"impermeable","def":"adj. not allowing fluid to pass through; impenetrable","ex":"The raincoat's impermeable fabric kept her completely dry."},{"word":"imperturbable","def":"adj. unable to be upset or agitated; calm and composed.","ex":"The pilot stayed imperturbable as warning lights flashed across the cockpit."},{"word":"impervious","def":"adj. unable to be affected or penetrated by something","ex":"He seemed impervious to criticism, ignoring every harsh review."},{"word":"impetuous","def":"adj. acting rashly and impulsively without thought","ex":"Her impetuous decision to quit left her with no income."},{"word":"impious","def":"adj. lacking reverence; disrespectful toward God or sacred things.","ex":"The villagers were scandalized by his impious mockery of their rituals."},{"word":"implacable","def":"adj. unable to be appeased or pacified; relentless","ex":"The general faced an implacable enemy who refused all terms."},{"word":"implication","def":"n. something suggested but not directly stated; a likely consequence","ex":"The implication of his silence was that he agreed with the plan."},{"word":"implicit","def":"adj. implied though not plainly expressed; unquestioning and absolute","ex":"There was an implicit understanding that the topic would not be raised."},{"word":"implode","def":"v. to collapse violently inward; to break down completely","ex":"The company imploded under the weight of its mounting debts."},{"word":"importune","def":"v. to beg or urge persistently and annoyingly.","ex":"Vendors importune tourists relentlessly, following them down every street."},{"word":"imprecation","def":"n. a spoken curse or invocation of evil upon someone","ex":"He muttered imprecations against the driver who had cut him off."},{"word":"imprudent","def":"adj. not showing care for consequences; unwise or rash.","ex":"It was imprudent of him to invest his savings in such a risky venture."},{"word":"impugn","def":"v. to attack as false or call into question; to challenge.","ex":"The defense sought to impugn the reliability of the prosecution's witness."},{"word":"impuissance","def":"n. powerlessness, weakness, or inability to act effectively.","ex":"The council's impuissance left it unable to enforce any of its own decrees."},{"word":"impute","def":"v. to attribute or ascribe a fault or quality to someone","ex":"Critics imputed selfish motives to the politician's generous gift."},{"word":"inadvertent","def":"adj. unintentional; resulting from carelessness or oversight","ex":"An inadvertent error in the formula skewed all the results."},{"word":"inasmuch","def":"adv. to the extent that; considering that (used with 'as')","ex":"He is responsible inasmuch as he approved the flawed plan."},{"word":"incarnadine","def":"adj. blood-red or crimson in color; v. to make red","ex":"The setting sun incarnadined the snowy peaks with crimson light."},{"word":"incendiary","def":"adj. designed to cause fire; tending to inflame conflict or passion","ex":"His incendiary speech provoked riots throughout the capital."},{"word":"incentive","def":"n. something that motivates or encourages action","ex":"Tax breaks offered a strong incentive for companies to relocate."},{"word":"inchoate","def":"adj. just begun and not fully formed; rudimentary.","ex":"His plans were still inchoate, little more than a few scattered notes."},{"word":"incinerate","def":"v. to destroy completely by burning.","ex":"The hospital must incinerate its medical waste to prevent contamination."},{"word":"incipient","def":"adj. beginning to emerge; in an initial stage","ex":"Doctors detected the incipient disease before symptoms appeared."},{"word":"incogitant","def":"adj. thoughtless or inconsiderate; lacking reflection.","ex":"His incogitant remarks revealed how little he had considered others' feelings."},{"word":"incommensurate","def":"adj. out of proportion; not corresponding in size or degree.","ex":"The harsh punishment was incommensurate with the minor offense committed."},{"word":"incongruent","def":"adj. not in harmony or agreement; inconsistent or out of place.","ex":"His cheerful tone seemed incongruent with the somber news he delivered."},{"word":"incongruous","def":"adj. out of place; not in harmony or keeping with surroundings","ex":"The modern skyscraper looked incongruous among the old cottages."},{"word":"inconsequential","def":"adj. unimportant or insignificant","ex":"The damage was inconsequential, barely a scratch on the bumper."},{"word":"inconstancy","def":"n. the quality of being changeable, unreliable, or fickle","ex":"His inconstancy in love left a trail of broken promises."},{"word":"incorporate","def":"v. to include or combine something into a larger whole","ex":"The architect incorporated solar panels into the building's design."},{"word":"inculcate","def":"v. to instill an idea or habit by persistent instruction","ex":"The coach worked to inculcate discipline in his young players."},{"word":"inculpate","def":"v. to accuse or incriminate; to attribute guilt to.","ex":"The recovered emails served to inculpate several executives in the fraud."},{"word":"indecorous","def":"adj. improper; in poor taste; not in keeping with good manners.","ex":"His indecorous laughter during the funeral drew disapproving stares."},{"word":"indefatigable","def":"adj. tireless; incapable of being worn out","ex":"The indefatigable volunteer worked eighteen hours without rest."},{"word":"indeterminate","def":"adj. not exactly known, established, or fixed; vague","ex":"The painting was of indeterminate age and uncertain origin."},{"word":"indifferent","def":"adj. having no interest or concern; mediocre in quality","ex":"He remained indifferent to the suffering around him."},{"word":"indigence","def":"n. extreme poverty or neediness","ex":"After losing his job, he sank into deep indigence."},{"word":"indoctrinate","def":"v. to teach a set of beliefs uncritically, often through repetition.","ex":"The regime sought to indoctrinate children with its ideology from an early age."},{"word":"indolent","def":"adj. habitually lazy; averse to activity or exertion.","ex":"Too indolent to seek work, he lounged about the house all day."},{"word":"indurate","def":"v. to harden; adj. hardened or callous, especially in feeling.","ex":"Years of cruelty had indurated his heart against all appeals for mercy."},{"word":"ineffable","def":"adj. too great or beautiful to be expressed in words.","ex":"Standing before the canyon, she felt an ineffable sense of awe."},{"word":"ineluctable","def":"adj. impossible to avoid or escape; inevitable.","ex":"Aging is an ineluctable process that no remedy can ultimately prevent."},{"word":"inert","def":"adj. lacking the power to move or act; chemically unreactive","ex":"The gas is inert and will not combine with other elements."},{"word":"inexorable","def":"adj. impossible to stop or prevent; relentless","ex":"The inexorable march of technology rendered the trade obsolete."},{"word":"infallible","def":"adj. incapable of making mistakes or being wrong","ex":"No expert is infallible, however confident they may seem."},{"word":"infatuate","def":"v. to inspire with intense, foolish, often short-lived passion.","ex":"The charming stranger managed to infatuate her within a single evening."},{"word":"infelicitous","def":"adj. not appropriate or well-chosen; unfortunate in expression.","ex":"His infelicitous joke about layoffs landed badly with the anxious staff."},{"word":"inform","def":"v. to give knowledge to; to give shape or character to something","ex":"A deep sense of justice informed all of her decisions."},{"word":"infuriate","def":"v. to make extremely angry; to enrage.","ex":"Nothing could infuriate the chef more than a customer salting his food untasted."},{"word":"ingenuous","def":"adj. innocent, frank, and unsuspecting; lacking guile.","ex":"Her ingenuous remarks revealed a trust that the cynics found endearing."},{"word":"ingrained","def":"adj. firmly fixed or deeply rooted; habitual","ex":"His ingrained suspicion of strangers was hard to overcome."},{"word":"ingrate","def":"n. an ungrateful person","ex":"After all their help, the ingrate never offered a word of thanks."},{"word":"ingratiate","def":"v. to bring oneself into favor by deliberate effort","ex":"He tried to ingratiate himself with the boss through flattery."},{"word":"ingratiating","def":"adj. intended to gain favor; flattering or pleasing in a calculated way.","ex":"The salesman's ingratiating smile only made customers more suspicious."},{"word":"inherent","def":"adj. existing as a natural and inseparable part of something","ex":"There are risks inherent in any high-altitude expedition."},{"word":"inimical","def":"adj. hostile; tending to obstruct or harm.","ex":"The harsh climate proved inimical to the crops the settlers tried to grow."},{"word":"iniquity","def":"n. gross injustice or wickedness","ex":"The reformers denounced the iniquity of the corrupt regime."},{"word":"innocuous","def":"adj. harmless; unlikely to offend or cause injury","ex":"What seemed an innocuous remark deeply wounded her feelings."},{"word":"inordinate","def":"adj. excessive; beyond reasonable limits","ex":"He spent an inordinate amount of time on a trivial detail."},{"word":"inquest","def":"n. an official inquiry or investigation, especially into a death","ex":"The coroner's inquest concluded that the death was accidental."},{"word":"insensible","def":"adj. unconscious or unaware; lacking feeling or perception.","ex":"The patient lay insensible, unresponsive to the doctors' urgent questions."},{"word":"insentient","def":"adj. incapable of feeling or perceiving; not sentient.","ex":"He treated the workers like insentient machines, indifferent to their fatigue."},{"word":"insinuate","def":"v. to hint slyly at something unpleasant; to maneuver oneself in subtly","ex":"She insinuated that he had cheated without ever saying so directly."},{"word":"insipid","def":"adj. lacking flavor, interest, or vigor; dull","ex":"The critic dismissed the novel as insipid and forgettable."},{"word":"insouciant","def":"adj. carefree and casually unconcerned; nonchalant.","ex":"With an insouciant shrug, she dismissed the looming deadline entirely."},{"word":"instate","def":"v. to set or establish in a position or office.","ex":"The board moved quickly to instate a new director after the resignation."},{"word":"insubordinate","def":"adj. defiant of authority; refusing to obey orders.","ex":"The insubordinate recruit ignored every command his sergeant issued."},{"word":"insular","def":"adj. narrow-minded and isolated; ignorant of other cultures","ex":"Living abroad cured him of his once insular outlook."},{"word":"insurrection","def":"n. a violent uprising against authority or government","ex":"The armed insurrection was crushed within a matter of days."},{"word":"intelligible","def":"adj. able to be understood; comprehensible","ex":"His mumbled explanation was barely intelligible over the phone."},{"word":"intemperate","def":"adj. lacking moderation or self-restraint; excessive.","ex":"His intemperate drinking eventually cost him both his health and his job."},{"word":"inter","def":"v. to bury (a dead body) in a grave or tomb.","ex":"They gathered to inter the veteran with full military honors."},{"word":"intercessor","def":"n. one who intervenes or pleads on behalf of another.","ex":"She acted as intercessor, begging the king to spare the condemned prisoner."},{"word":"interdict","def":"v. to prohibit or forbid; to cut off or intercept.","ex":"Naval forces moved to interdict the smugglers' supply routes at sea."},{"word":"interplay","def":"n. the way two or more things affect or influence each other.","ex":"The novel explores the interplay between memory and identity."},{"word":"interregnum","def":"n. a period between two reigns or governments when normal authority is suspended; any gap or pause.","ex":"During the interregnum between presidents, no major policies were enacted by the caretaker cabinet."},{"word":"intoxicant","def":"n. a substance, such as alcohol or a drug, that causes intoxication or impairment.","ex":"The ancient brew functioned as both a sacred ritual drink and a potent intoxicant."},{"word":"intractable","def":"adj. hard to control, manage, or solve; stubborn.","ex":"Poverty remains an intractable problem resistant to quick fixes."},{"word":"intransigent","def":"adj. refusing to compromise or change one's views; stubbornly uncompromising.","ex":"The intransigent union leader rejected every concession the company offered during negotiations."},{"word":"intrepid","def":"adj. fearless and bold; brave in facing danger.","ex":"The intrepid explorer crossed the frozen tundra alone."},{"word":"intrinsic","def":"adj. belonging naturally; essential and inherent.","ex":"Curiosity is intrinsic to good scientific research."},{"word":"inundate","def":"v. to flood or overwhelm with a great quantity of something.","ex":"After the announcement, the office was inundated with hundreds of frantic phone calls."},{"word":"inure","def":"v. to accustom someone to something unpleasant; to harden by habit.","ex":"Years on the trauma ward had inured the nurses to scenes that horrified visitors."},{"word":"invective","def":"n. harsh, abusive language or denunciation.","ex":"His speech degenerated into pure invective, hurling insults instead of arguments."},{"word":"inveigh","def":"v. to protest or complain bitterly; to rail against something.","ex":"The columnist inveighed against corruption in weekly editorials that spared no official."},{"word":"inveigle","def":"v. to persuade someone by flattery or deception; to wheedle or coax.","ex":"She inveigled her way into the exclusive party by charming the doorman."},{"word":"investiture","def":"n. a ceremony formally conferring an office, rank, or authority.","ex":"The bishop's investiture drew dignitaries from across the country."},{"word":"inveterate","def":"adj. firmly established by long habit; deeply ingrained or habitual.","ex":"An inveterate gambler, he could not pass a casino without placing a bet."},{"word":"invidious","def":"adj. likely to provoke resentment or envy; unfairly discriminating.","ex":"Ranking the children publicly created invidious comparisons that bred lasting jealousy."},{"word":"invigorate","def":"v. to give energy or strength to; to enliven.","ex":"A brisk morning swim never failed to invigorate her for the day ahead."},{"word":"irascible","def":"adj. easily angered; quick-tempered.","ex":"The irascible chef berated his staff over the slightest mistake in the kitchen."},{"word":"irk","def":"v. to irritate or annoy.","ex":"It irked him that his careful work went entirely unacknowledged by the committee."},{"word":"irradicable","def":"adj. impossible to remove, root out, or eradicate.","ex":"Decades of propaganda had left an irradicable suspicion of outsiders in the village."},{"word":"irresolute","def":"adj. hesitant and uncertain; unable to decide.","ex":"His irresolute leadership left the team waiting for clear direction."},{"word":"itinerant","def":"adj. traveling from place to place, especially for work.","ex":"The itinerant preacher moved between villages every week."},{"word":"itinerary","def":"n. a planned route or schedule of a journey.","ex":"Our itinerary included three cities in five days."},{"word":"jabber","def":"v. to talk rapidly and unintelligibly; n. fast, meaningless chatter.","ex":"The excited children jabbered all at once, so no one could follow the story."},{"word":"jape","def":"n. a practical joke or jest; v. to joke or jeer.","ex":"His harmless jape involved swapping the labels on every spice jar."},{"word":"jargon","def":"n. specialized or technical language hard for outsiders to understand.","ex":"The manual was buried in legal jargon no layperson could follow."},{"word":"jejune","def":"adj. naive or simplistic; lacking interest or substance; dull.","ex":"The critic dismissed the novel's themes as jejune and unworthy of serious adults."},{"word":"jettison","def":"v. to throw off or discard, especially to lighten a load.","ex":"The company jettisoned its unprofitable divisions to survive."},{"word":"jingoism","def":"n. aggressive, boastful patriotism favoring war or hostility abroad.","ex":"The editorial denounced the jingoism fueling calls for invasion."},{"word":"jingoist","def":"n. one who advocates aggressive nationalism and a belligerent foreign policy.","ex":"The jingoist demanded war over a minor border dispute, ignoring diplomatic options."},{"word":"jocular","def":"adj. fond of joking; humorous or playful.","ex":"His jocular remarks at the meeting lightened the otherwise tense atmosphere."},{"word":"jocund","def":"adj. cheerful and lighthearted; merry.","ex":"The jocund crowd sang and danced late into the festival night."},{"word":"judicious","def":"adj. showing good judgment; wise and sensible.","ex":"A judicious use of resources kept the project on budget."},{"word":"juncture","def":"n. a critical point in time; a joining place.","ex":"At this juncture, retreating would mean losing everything gained."},{"word":"juxtapose","def":"v. to place side by side for contrast or comparison.","ex":"The exhibit juxtaposes ancient pottery with modern sculpture."},{"word":"keen","def":"adj. sharp, eager, or intellectually acute.","ex":"She had a keen eye for spotting flaws in arguments."},{"word":"kindle","def":"v. to ignite or arouse (a fire, feeling, or interest).","ex":"The lecture kindled her passion for astronomy."},{"word":"kinetic","def":"adj. relating to or resulting from motion.","ex":"The dancers filled the stage with kinetic energy."},{"word":"knell","def":"n. the solemn sound of a bell, often signaling death or an end.","ex":"The scandal sounded the death knell for his political career."},{"word":"kudos","def":"n. praise and honor for an achievement.","ex":"The team earned kudos for delivering the project early."},{"word":"labile","def":"adj. liable to change; easily altered or emotionally unstable.","ex":"His labile moods swung from elation to despair within a single afternoon."},{"word":"lacerate","def":"v. to tear or cut roughly; to wound deeply, physically or emotionally.","ex":"The jagged rocks lacerated the climber's hands as he scrambled upward."},{"word":"lachrymose","def":"adj. tearful or given to weeping; mournful.","ex":"The lachrymose widow could not finish her speech without dissolving into tears."},{"word":"lackluster","def":"adj. lacking brilliance, energy, or distinction; dull.","ex":"Critics panned the film's lackluster performances."},{"word":"laconic","def":"adj. using very few words; terse.","ex":"His laconic reply, a single 'No,' ended the negotiation abruptly."},{"word":"lambaste","def":"v. to criticize harshly; to scold or beat severely.","ex":"The coach lambasted the team for their careless errors in the final quarter."},{"word":"lament","def":"v. to mourn or express deep regret; n. an expression of grief.","ex":"Residents lament the loss of the old neighborhood theater."},{"word":"lampoon","def":"v. to ridicule with satire; n. a sharp satirical attack.","ex":"The cartoon lampooned the senator's vanity by drawing him admiring his own statue."},{"word":"landmark","def":"n. a notable event or object; adj. of major significance.","ex":"The court's landmark ruling reshaped privacy law."},{"word":"languid","def":"adj. lacking energy or vigor; slow and relaxed.","ex":"They spent a languid afternoon dozing by the river."},{"word":"languor","def":"n. a state of pleasant tiredness, weariness, or dreamy inactivity.","ex":"A heavy languor settled over the picnickers in the warm afternoon sun."},{"word":"lank","def":"adj. long and thin; (of hair) straight and limp.","ex":"His lank hair hung dejectedly over his eyes after the long, rainy march."},{"word":"larceny","def":"n. the unlawful taking of another's property; theft.","ex":"He was charged with larceny after stealing the bicycles."},{"word":"largess","def":"n. generosity in giving; money or gifts given generously.","ex":"The museum thrived on the largess of wealthy patrons."},{"word":"largesse","def":"n. generosity in giving; money or gifts given generously.","ex":"The library was built entirely through the largesse of a single anonymous donor."},{"word":"lassitude","def":"n. a state of physical or mental weariness; lack of energy.","ex":"A tropical lassitude overcame the travelers, sapping any will to sightsee."},{"word":"latent","def":"adj. existing but hidden or not yet active.","ex":"The training revealed her latent talent for leadership."},{"word":"laudable","def":"adj. deserving praise; commendable.","ex":"Her laudable effort to help refugees earned wide admiration."},{"word":"laudatory","def":"adj. expressing praise.","ex":"The reviews were so laudatory that tickets sold out within an hour."},{"word":"lavish","def":"adj. extravagant or abundant; v. to give in great amounts.","ex":"They threw a lavish banquet for hundreds of guests."},{"word":"lax","def":"adj. not strict or careful; negligent.","ex":"Lax security allowed the intruders to slip inside."},{"word":"layperson","def":"n. a person without specialized or professional knowledge of a subject.","ex":"The doctor explained the diagnosis in terms a layperson could grasp."},{"word":"leaven","def":"v. to permeate and modify or enliven; to cause to rise like dough.","ex":"She leavened her serious lecture with occasional jokes to keep students engaged."},{"word":"leery","def":"adj. cautious or suspicious; wary.","ex":"Investors were leery of the company's unverified claims."},{"word":"legerdemain","def":"n. skillful deception or trickery; sleight of hand.","ex":"The accountant's legerdemain hid the firm's mounting losses."},{"word":"lethargic","def":"adj. sluggish and lacking energy or enthusiasm.","ex":"The heat left everyone feeling lethargic and unmotivated."},{"word":"levelheaded","def":"adj. sensible, calm, and able to make good judgments under pressure.","ex":"Her levelheaded response to the crisis reassured the panicking passengers."},{"word":"levity","def":"n. humor or lightness, especially when seriousness is expected.","ex":"A bit of levity eased the tension in the courtroom."},{"word":"levy","def":"v. to impose (a tax or fine); n. an imposed tax or charge.","ex":"The government will levy a new tax on imported goods."},{"word":"libelous","def":"adj. containing a false published statement that damages a person's reputation.","ex":"The magazine retracted the libelous article and apologized to the actress."},{"word":"liberal","def":"adj. generous or abundant; open to new ideas and reform.","ex":"She was liberal with both her time and her advice."},{"word":"libertine","def":"n. a person who lives without moral or sexual restraint.","ex":"The poet was notorious as a libertine who scorned convention."},{"word":"licentious","def":"adj. lacking moral or sexual restraint; promiscuous.","ex":"Reformers condemned the licentious behavior flaunted at the court of the king."},{"word":"likewise","def":"adv. in the same way; also or similarly.","ex":"The veterans stayed silent, and the recruits did likewise."},{"word":"limpid","def":"adj. perfectly clear and transparent; lucid in expression.","ex":"The limpid mountain stream revealed every pebble on its bed."},{"word":"lionize","def":"v. to treat someone as a celebrity; to glorify.","ex":"The press lionized the young pilot after his daring transatlantic flight."},{"word":"lissome","def":"adj. supple, graceful, and lithe in movement.","ex":"The lissome dancer bent and twirled as though her body had no bones."},{"word":"listless","def":"adj. lacking energy, enthusiasm, or interest.","ex":"Bored and listless, the students stared out the window."},{"word":"livid","def":"adj. furiously angry; also, discolored as from a bruise.","ex":"She was livid when she discovered the broken promise."},{"word":"log","def":"v. to record systematically; n. an official record of events.","ex":"The captain logged each storm in the ship's record."},{"word":"loll","def":"v. to lounge or recline lazily; to hang loosely.","ex":"The cats lolled in the sun all afternoon, ignoring their toys entirely."},{"word":"loquacious","def":"adj. very talkative.","ex":"Our loquacious guide narrated every detail until even the patient tourists tired."},{"word":"loutish","def":"adj. rude, awkward, and ill-mannered.","ex":"His loutish behavior at dinner embarrassed everyone seated at the table."},{"word":"lubricate","def":"v. to apply a slippery substance to reduce friction; to make smoother.","ex":"A small bribe lubricated the bureaucratic process, and his permit arrived quickly."},{"word":"lucid","def":"adj. clear and easy to understand; mentally clear.","ex":"Her lucid explanation made the theorem suddenly obvious."},{"word":"lugubrious","def":"adj. looking or sounding mournful, dismal, or gloomy, often exaggeratedly so.","ex":"The hound's lugubrious expression made it seem perpetually heartbroken."},{"word":"lull","def":"n. a temporary calm or pause; v. to soothe or calm.","ex":"A brief lull in the storm let them escape to shelter."},{"word":"lumber","def":"v. to move heavily and clumsily.","ex":"The bear lumbered across the meadow toward the stream."},{"word":"luminary","def":"n. a person of great prominence or achievement in a field.","ex":"Scientific luminaries from around the world gathered to honor the aging physicist."},{"word":"luminous","def":"adj. giving off light; bright or radiant.","ex":"The luminous moon lit the entire valley."},{"word":"lurid","def":"adj. shockingly vivid or sensational; gruesome.","ex":"The tabloid ran lurid details of the celebrity scandal."},{"word":"macerate","def":"v. to soften or break down by soaking; to cause to waste away.","ex":"The recipe instructs you to macerate the berries in sugar before baking."},{"word":"machination","def":"n. a crafty scheme or plot intended to harm someone.","ex":"The duke's downfall resulted from the machinations of his ambitious rivals."},{"word":"maculate","def":"adj. spotted or stained; impure. v. to stain.","ex":"The once-pristine reputation was now maculate with rumors of fraud."},{"word":"maelstrom","def":"n. a powerful whirlpool; a scene of turbulent confusion.","ex":"The country plunged into a maelstrom of revolution."},{"word":"magnanimous","def":"adj. generous and forgiving, especially toward rivals.","ex":"The champion was magnanimous in victory, praising her opponent."},{"word":"magnate","def":"n. a wealthy and powerful person in business or industry.","ex":"The oil magnate funded museums across the state."},{"word":"makeshift","def":"adj. serving as a temporary, improvised substitute.","ex":"They built a makeshift shelter from branches and tarps."},{"word":"maladroit","def":"adj. clumsy or inept; lacking skill or tact.","ex":"His maladroit attempt at an apology only deepened the misunderstanding."},{"word":"malcontent","def":"n. a person who is dissatisfied and rebellious. adj. discontented.","ex":"A handful of malcontents tried to stir the workers into open revolt."},{"word":"malediction","def":"n. a curse or the utterance of a curse.","ex":"The old woman hurled a malediction at the departing soldiers."},{"word":"malinger","def":"v. to pretend illness to avoid work or duty.","ex":"The sergeant suspected the recruit was malingering to dodge the morning drills."},{"word":"malleable","def":"adj. easily shaped or influenced; pliable.","ex":"Young minds are malleable and quick to absorb new ideas."},{"word":"malodorous","def":"adj. having a foul smell.","ex":"The malodorous swamp drove the hikers to seek a different route."},{"word":"manacle","def":"n. a handcuff or shackle. v. to restrain or fetter.","ex":"Heavy manacles bound the prisoner's wrists as he was led to court."},{"word":"mangle","def":"v. to mutilate or disfigure by tearing; to ruin or botch.","ex":"The nervous actor mangled his lines, garbling the play's most famous speech."},{"word":"mangy","def":"adj. shabby, squalid, or in poor condition; having mange.","ex":"A mangy stray dog wandered the alley, its fur falling out in patches."},{"word":"manifest","def":"adj. clear and obvious; v. to display or reveal clearly.","ex":"His anxiety was manifest in his trembling hands."},{"word":"mannered","def":"adj. artificial or stylized; not natural in behavior.","ex":"His mannered speech sounded rehearsed and insincere."},{"word":"manumit","def":"v. to release from slavery; to set free.","ex":"In his will, the planter chose to manumit the laborers who had served him."},{"word":"mar","def":"v. to damage or spoil the quality or appearance of.","ex":"A single typo marred the otherwise flawless report."},{"word":"martinet","def":"n. a person who demands strict, rigid adherence to rules and discipline.","ex":"The new principal was a martinet who punished students for the smallest infractions."},{"word":"matriculate","def":"v. to enroll or be admitted as a student at a college or university.","ex":"She will matriculate at the university this autumn after a year of travel."},{"word":"maudlin","def":"adj. tearfully or excessively sentimental.","ex":"After his third drink, he grew maudlin and wept over old photographs."},{"word":"maverick","def":"n. an independent thinker who refuses to conform.","ex":"The maverick senator broke ranks to oppose the bill."},{"word":"mawkish","def":"adj. excessively and falsely sentimental; sickly emotional.","ex":"The greeting card's mawkish verse made the recipient cringe rather than smile."},{"word":"maxim","def":"n. a short statement expressing a general truth or rule.","ex":"He lived by the maxim that honesty is the best policy."},{"word":"mellifluous","def":"adj. sweet-sounding; flowing smoothly and pleasantly.","ex":"The announcer's mellifluous voice made even traffic reports sound soothing."},{"word":"mendacious","def":"adj. given to lying; dishonest or false.","ex":"His mendacious account of the accident fell apart under the lawyer's questioning."},{"word":"mendicant","def":"n. a beggar; adj. depending on charity for a living.","ex":"The mendicant monk owned nothing but his robe and bowl."},{"word":"mercurial","def":"adj. subject to sudden, unpredictable changes of mood.","ex":"Her mercurial temper made him cautious around her."},{"word":"meretricious","def":"adj. attractive but cheap, gaudy, or insincere; falsely alluring.","ex":"The film's meretricious special effects could not disguise its hollow plot."},{"word":"mesmeric","def":"adj. causing a hypnotic or spellbinding fascination.","ex":"The dancer's mesmeric movements held the audience in rapt, silent attention."},{"word":"metamorphose","def":"v. to transform completely in form or nature.","ex":"Over the decade, the sleepy fishing town metamorphosed into a bustling resort."},{"word":"metamorphosis","def":"n. a complete change in form, nature, or character.","ex":"The shy intern underwent a metamorphosis into a confident leader."},{"word":"metaphysical","def":"adj. relating to abstract reality beyond the physical or observable.","ex":"The lecture wandered into metaphysical questions about consciousness."},{"word":"meticulous","def":"adj. extremely careful and precise about details.","ex":"Her meticulous notes left nothing to chance."},{"word":"miff","def":"v. to annoy or offend mildly; n. a petty quarrel or fit of pique.","ex":"She was a bit miffed at not being invited to the impromptu lunch."},{"word":"milieu","def":"n. a person's social or cultural surroundings; environment.","ex":"The artist thrived in the bohemian milieu of the city."},{"word":"militate","def":"v. to have a strong influence, especially against something.","ex":"Lack of funding militates against expanding the program."},{"word":"minatory","def":"adj. expressing or conveying a threat; menacing.","ex":"The landlord's minatory letter warned of eviction within the week."},{"word":"ministration","def":"n. the act of providing help, care, or service, especially aid to others.","ex":"Thanks to the nurses' tireless ministrations, the patient slowly regained his strength."},{"word":"mired","def":"adj. stuck or entangled, as in mud or difficulty.","ex":"The project was mired in delays and budget disputes."},{"word":"mirth","def":"n. amusement or laughter; merriment.","ex":"The comedian's antics filled the room with mirth."},{"word":"misanthrope","def":"n. a person who dislikes and avoids other people.","ex":"The aging misanthrope refused all visitors to his cabin."},{"word":"misanthropic","def":"adj. disliking or distrusting humankind in general.","ex":"The misanthropic hermit retreated to the mountains to avoid all human contact."},{"word":"misapprehension","def":"n. a mistaken belief or misunderstanding.","ex":"He acted under the misapprehension that the meeting had been canceled."},{"word":"misconstrue","def":"v. to interpret or understand wrongly.","ex":"She misconstrued his silence as disapproval when he was merely deep in thought."},{"word":"miscreant","def":"n. a person who behaves badly or breaks the law; a villain.","ex":"Police rounded up the miscreants responsible for vandalizing the monument."},{"word":"misdemeanour","def":"n. a minor wrongdoing; a less serious crime than a felony.","ex":"He was charged with a misdemeanour for the minor act of trespassing."},{"word":"miserly","def":"adj. extremely stingy with money; hoarding wealth.","ex":"Despite his fortune, the miserly old man refused to heat his own house."},{"word":"misgiving","def":"n. a feeling of doubt, suspicion, or unease about an outcome.","ex":"She signed the contract despite serious misgivings about the buyer's intentions."},{"word":"missive","def":"n. a written message or letter.","ex":"She received a lengthy missive from her estranged brother."},{"word":"mitigate","def":"v. to make less severe, painful, or harmful.","ex":"Planting trees can help mitigate the effects of flooding."},{"word":"modest","def":"adj. moderate in amount; humble and unpretentious.","ex":"They earned a modest profit in their first year."},{"word":"modicum","def":"n. a small or moderate amount of something.","ex":"With a modicum of effort, you could pass the exam."},{"word":"modish","def":"adj. fashionable; in keeping with current styles.","ex":"She arrived in a modish coat that turned heads."},{"word":"mollify","def":"v. to soothe or appease someone's anger; to soften.","ex":"A sincere apology and a refund mollified the irate customer."},{"word":"mollycoddle","def":"v. to treat with excessive indulgence and protection; to pamper.","ex":"The coach refused to mollycoddle his players, demanding they push through fatigue."},{"word":"molt","def":"v. to shed feathers, skin, or hair periodically for replacement.","ex":"Each spring the snake will molt, leaving its papery old skin behind."},{"word":"monastic","def":"adj. relating to monks or a severe, secluded lifestyle.","ex":"He led a monastic life of study and quiet reflection."},{"word":"monotony","def":"n. tiresome sameness; lack of variety.","ex":"The monotony of the assembly line wore on her nerves."},{"word":"mordant","def":"adj. sharply sarcastic or biting in style; caustic.","ex":"Her mordant wit spared no one, least of all the pompous guest of honor."},{"word":"moreover","def":"adv. in addition; besides; furthermore.","ex":"The plan is costly; moreover, it is unlikely to work."},{"word":"mores","def":"n. the accepted customs and moral attitudes of a group.","ex":"Travelers should respect the mores of the cultures they visit."},{"word":"morose","def":"adj. gloomy, sullen, and ill-tempered.","ex":"He grew morose after losing his job."},{"word":"motile","def":"adj. capable of moving spontaneously and independently.","ex":"Under the microscope, the motile bacteria darted across the slide."},{"word":"mottle","def":"v. to mark with spots or blotches of color. n. a blotchy pattern.","ex":"Sunlight through the leaves mottled the forest floor with shifting patches of gold."},{"word":"muffle","def":"v. to wrap up for warmth or to deaden sound; to suppress.","ex":"Thick carpet muffled the footsteps of guests crossing the upstairs hall."},{"word":"mulish","def":"adj. stubborn and obstinate, like a mule.","ex":"His mulish refusal to ask for directions left them lost for hours."},{"word":"multifarious","def":"adj. having great variety; many and varied.","ex":"The festival offered multifarious attractions, from puppet shows to fireworks."},{"word":"mundane","def":"adj. ordinary and dull; concerned with everyday matters.","ex":"She longed to escape the mundane routine of office work."},{"word":"munificent","def":"adj. extremely generous in giving.","ex":"A munificent grant from the foundation funded scholarships for a hundred students."},{"word":"myopic","def":"adj. lacking foresight or breadth of view; shortsighted.","ex":"The company's myopic focus on profits ignored long-term risks."},{"word":"na","def":"adj. innocent and inexperienced; lacking worldly wisdom (naive).","ex":"It was na to assume everyone would honor the agreement."},{"word":"nadir","def":"n. the lowest point of something.","ex":"The defeat marked the nadir of his political fortunes."},{"word":"nascent","def":"adj. just beginning to exist or develop; emerging.","ex":"The nascent industry attracted bold young investors."},{"word":"nauseate","def":"v. to cause to feel sick or disgusted.","ex":"The greasy smell of the diner began to nauseate the queasy traveler."},{"word":"naysay","def":"v. to oppose, deny, or refuse; to voice objection.","ex":"No matter how solid the plan, he would always find reasons to naysay it."},{"word":"negate","def":"v. to nullify, cancel, or deny.","ex":"One careless error negated weeks of careful work."},{"word":"neologism","def":"n. a newly coined word or expression.","ex":"\"Selfie\" was once a neologism that quickly entered everyday speech."},{"word":"neophyte","def":"n. a beginner or novice; a recent convert.","ex":"As a neophyte to chess, she struggled to anticipate her opponent's moves."},{"word":"net","def":"adj. remaining after deductions; v. to obtain as profit.","ex":"After expenses, the sale netted them a small gain."},{"word":"nettle","def":"v. to irritate or annoy.","ex":"The reporter's pointed questions clearly nettled the senator."},{"word":"nevertheless","def":"adv. in spite of that; nonetheless.","ex":"The odds were poor; nevertheless, they pressed on."},{"word":"nicety","def":"n. a fine or subtle detail or distinction; precise refinement.","ex":"He observed every social nicety, from the proper fork to the timing of toasts."},{"word":"nitpick","def":"v. to find fault in a petty, trivial way; to criticize minor details.","ex":"Rather than praise the report, the manager nitpicked the font and margins."},{"word":"noisome","def":"adj. having an extremely unpleasant smell; harmful or offensive.","ex":"A noisome odor rose from the neglected garbage piled in the alley."},{"word":"nominal","def":"adj. in name only; very small or trivial in amount.","ex":"He remained the nominal head while others ran the company."},{"word":"nonentity","def":"n. a person or thing of no importance or significance.","ex":"Once a celebrated star, he faded into a nonentity within a few years."},{"word":"nonplus","def":"v. to bewilder or confound; to leave someone unsure how to respond.","ex":"The unexpected question nonplussed the speaker, who fell silent for a moment."},{"word":"nontrivial","def":"adj. not simple or minor; significant and substantial.","ex":"Solving the equation required a nontrivial amount of effort."},{"word":"normative","def":"adj. relating to or prescribing standards or norms.","ex":"The essay made normative claims about how citizens ought to behave."},{"word":"notoriety","def":"n. the state of being famous for something bad.","ex":"The forger gained notoriety for duping major museums."},{"word":"novel","def":"adj. new, original, or unusual.","ex":"The team proposed a novel approach to recycling plastic."},{"word":"nuance","def":"n. a subtle difference in meaning, tone, or expression.","ex":"A good translator captures the nuance of the original text."},{"word":"nugatory","def":"adj. of little or no value or importance; trifling; ineffective.","ex":"The committee's recommendations proved nugatory, ignored by everyone in power."},{"word":"numinous","def":"adj. having a strong spiritual or supernatural quality; awe-inspiring.","ex":"A numinous silence filled the ancient cathedral as dusk fell."},{"word":"oaf","def":"n. a clumsy, stupid, or ill-mannered person.","ex":"The clumsy oaf knocked over the vase while reaching for his coat."},{"word":"obdurate","def":"adj. stubbornly refusing to change one's opinion or course; hardhearted.","ex":"The obdurate judge refused every appeal for leniency in the case."},{"word":"obeisance","def":"n. a gesture of respect or submission; deference or homage.","ex":"The courtiers made deep obeisance as the emperor entered the throne room."},{"word":"obfuscate","def":"v. to make obscure or unclear; to confuse deliberately.","ex":"The official used jargon to obfuscate the true cost of the project."},{"word":"objective","def":"adj. based on facts, not feelings; n. a goal or aim.","ex":"A judge must remain objective despite personal opinions."},{"word":"oblique","def":"adj. indirect or evasive; slanting rather than straight.","ex":"He gave an oblique answer that avoided the real question."},{"word":"obloquy","def":"n. strong public condemnation or abusive language; disgrace from criticism.","ex":"The scandal subjected the once-revered banker to widespread obloquy."},{"word":"obsequious","def":"adj. excessively eager to please or obey; fawning and servile.","ex":"The obsequious waiter hovered constantly, agreeing with everything the diners said."},{"word":"obsolete","def":"adj. no longer in use; outdated.","ex":"Smartphones rendered many older gadgets obsolete."},{"word":"obstinate","def":"adj. stubbornly refusing to change one's opinion or course of action.","ex":"The obstinate negotiator rejected every compromise, insisting on his original terms."},{"word":"obstreperous","def":"adj. noisy and difficult to control; unruly and resistant to authority.","ex":"The obstreperous toddler kicked and screamed when told to leave the playground."},{"word":"obtrusive","def":"adj. noticeable in an unwelcome way; undesirably prominent or intrusive.","ex":"The obtrusive billboard blocked the otherwise beautiful view of the valley."},{"word":"obviate","def":"v. to prevent or remove a difficulty, making an action unnecessary.","ex":"A clear contract can obviate the need for costly legal disputes later."},{"word":"occlude","def":"v. to block, close, or obstruct an opening or passage.","ex":"A buildup of plaque can occlude the arteries and restrict blood flow."},{"word":"occult","def":"adj. supernatural or mystical; hidden or secret; v. to hide from view.","ex":"She studied occult traditions involving rituals concealed from ordinary believers."},{"word":"odium","def":"n. general or widespread hatred and disgust directed toward someone.","ex":"The traitor earned the odium of an entire nation after the scandal."},{"word":"offhand","def":"adj. casual or careless; made without prior thought; adv. without preparation.","ex":"His offhand remark about the budget unintentionally offended the entire committee."},{"word":"officious","def":"adj. excessively eager to offer unwanted advice or services; meddlesome.","ex":"The officious clerk insisted on rearranging my paperwork though I never asked."},{"word":"offish","def":"adj. aloof and distant in manner; standoffish and unfriendly.","ex":"Her offish greeting made the new colleagues feel unwelcome at the office."},{"word":"offset","def":"v. to counterbalance or compensate for; n. a counterbalancing amount.","ex":"Gains in the export division helped offset losses in domestic sales."},{"word":"onerous","def":"adj. involving great effort, difficulty, or burden.","ex":"The contract imposed onerous obligations that the small firm could barely meet."},{"word":"opaque","def":"adj. not transparent; difficult to understand or obscure in meaning.","ex":"The legal document was so opaque that even lawyers struggled to interpret it."},{"word":"opine","def":"v. to state an opinion, often with an air of authority.","ex":"Critics opined that the film, though beautiful, lacked any emotional depth."},{"word":"opprobrious","def":"adj. expressing scornful reproach; abusive; shameful or disgraceful.","ex":"He hurled opprobrious insults at the referee after the controversial call."},{"word":"opprobrium","def":"n. harsh public criticism or scorn; disgrace from shameful conduct.","ex":"The disgraced official faced widespread opprobrium after the fraud was exposed."},{"word":"optimal","def":"adj. best or most favorable; most desirable under the circumstances.","ex":"Engineers searched for the optimal design balancing cost and durability."},{"word":"optimum","def":"n. the most favorable condition or amount; adj. best or most favorable.","ex":"The greenhouse maintains the optimum temperature for rapid plant growth."},{"word":"orotund","def":"adj. (of the voice) full and rich; pompous or bombastic in style.","ex":"The senator's orotund speech sounded impressive but said very little."},{"word":"orthodox","def":"adj. conforming to traditional, established, or accepted beliefs.","ex":"Her orthodox methods clashed with the lab's experimental new approaches."},{"word":"oscillate","def":"v. to swing back and forth; to waver between options or positions.","ex":"The senator oscillated between supporting and opposing the bill for weeks."},{"word":"ossify","def":"v. to turn into bone; to become rigid and resistant to change.","ex":"Over decades the once-radical party ossified into a defender of tradition."},{"word":"ostensible","def":"adj. apparent or stated, but not necessarily the true reason.","ex":"The ostensible purpose of the trip was business, though he mostly vacationed."},{"word":"ostentatious","def":"adj. showy or pretentious, designed to impress or attract notice.","ex":"The mansion's ostentatious gold fixtures struck guests as vulgar rather than elegant."},{"word":"ostracize","def":"v. to exclude someone from a group or society deliberately.","ex":"His classmates ostracized him after he reported their cheating to the teacher."},{"word":"outmaneuver","def":"v. to gain advantage over a rival through cleverer tactics or strategy.","ex":"The startup outmaneuvered larger rivals by reacting faster to market shifts."},{"word":"outstrip","def":"v. to surpass, exceed, or move faster than.","ex":"Demand for the new phone quickly outstripped the company's production capacity."},{"word":"overshadow","def":"v. to dominate or make less important; to cast a shadow over.","ex":"Her brother's fame tended to overshadow her own remarkable achievements."},{"word":"overweening","def":"adj. showing excessive confidence, arrogance, or presumption.","ex":"His overweening pride blinded him to the obvious flaws in his plan."},{"word":"overwrought","def":"adj. extremely agitated or nervous; excessively elaborate in style.","ex":"The overwrought parent panicked at every minor scrape her child suffered."},{"word":"paean","def":"n. a song or expression of joyful praise, triumph, or thanksgiving.","ex":"The review was a glowing paean to the chef's inventive new menu."},{"word":"palatial","def":"adj. resembling a palace; spacious and splendid.","ex":"The CEO worked from a palatial office with marble floors and chandeliers."},{"word":"palaver","def":"n. prolonged, idle, or fussy talk; unnecessary fuss; v. to chatter idly.","ex":"After much palaver about the budget, the committee made no decisions."},{"word":"palliate","def":"v. to ease symptoms without curing; to make a fault seem less serious.","ex":"The medicine palliated her pain but could not address the underlying disease."},{"word":"pallid","def":"adj. pale and lacking color, especially from illness; lacking vitality.","ex":"His pallid complexion and trembling hands suggested he was gravely ill."},{"word":"palmy","def":"adj. flourishing, prosperous, and full of success or glory.","ex":"She reminisced about the palmy days when the theater drew sellout crowds."},{"word":"palpitation","def":"n. a rapid, fluttering, or irregular beating of the heart.","ex":"The sudden fright caused palpitations that left her clutching her chest."},{"word":"palter","def":"v. to talk or act insincerely; to equivocate or haggle deceptively.","ex":"Stop paltering and tell me plainly whether you accept the offer."},{"word":"panache","def":"n. flamboyant confidence, flair, and stylish self-assurance.","ex":"She delivered the closing argument with such panache that jurors applauded."},{"word":"panegyric","def":"n. a formal speech or piece of writing in lavish praise of someone.","ex":"The eulogy became a panegyric celebrating the scientist's lifelong achievements."},{"word":"panoply","def":"n. a complete or impressive collection or display of something.","ex":"The museum offered a dazzling panoply of artifacts from ancient civilizations."},{"word":"paradigm","def":"n. a typical example or model; a framework of assumptions in a field.","ex":"The discovery forced scientists to abandon the old paradigm entirely."},{"word":"paradox","def":"n. a statement or situation that seems contradictory yet may be true.","ex":"It is a paradox that spending money can sometimes help you save it."},{"word":"paragon","def":"n. a model of excellence or perfection.","ex":"The veteran teacher was regarded as a paragon of patience and dedication."},{"word":"parch","def":"v. to make or become very dry, especially through intense heat.","ex":"Weeks without rain parched the fields until the soil cracked apart."},{"word":"pare","def":"v. to trim or cut away; to reduce gradually.","ex":"The company had to pare its expenses to survive the downturn."},{"word":"pariah","def":"n. a social outcast; someone despised or rejected by others.","ex":"After the scandal, the once-popular executive became a corporate pariah."},{"word":"parley","def":"n. a discussion or negotiation, especially between enemies; v. to negotiate.","ex":"The generals agreed to a brief parley to discuss terms of surrender."},{"word":"paroxysm","def":"n. a sudden, violent outburst of emotion or activity; a fit or spasm.","ex":"A paroxysm of laughter seized the audience during the comedian's routine."},{"word":"parry","def":"v. to deflect or evade, as a blow or a question.","ex":"The politician deftly parried every hostile question from the reporters."},{"word":"parsimonious","def":"adj. excessively unwilling to spend money or resources; stingy.","ex":"The parsimonious manager refused to buy new chairs even after they broke."},{"word":"partial","def":"adj. incomplete; biased or favoring one side; (partial to) fond of.","ex":"The referee seemed partial, repeatedly ruling in favor of the home team."},{"word":"particularize","def":"v. to give specific details; to describe item by item.","ex":"Rather than generalize, please particularize each expense in the report."},{"word":"partisan","def":"n. a strong supporter of a party or cause; adj. prejudiced in favor of one side.","ex":"The bill stalled because of bitter partisan disagreement in the legislature."},{"word":"pastiche","def":"n. a work imitating or combining styles of other works.","ex":"The film was a clever pastiche of classic noir detective movies."},{"word":"patent","def":"adj. obvious or clearly evident; n. an exclusive right to an invention.","ex":"His patent disregard for the rules infuriated his supervisors."},{"word":"pathogenic","def":"adj. capable of causing disease.","ex":"Researchers isolated the pathogenic bacteria responsible for the outbreak."},{"word":"pathological","def":"adj. relating to disease; compulsive or irrational in the extreme.","ex":"His pathological need to lie eventually destroyed all his friendships."},{"word":"patronizing","def":"adj. treating someone as inferior while appearing kind; condescending.","ex":"Her patronizing tone made the new interns feel belittled and unwelcome."},{"word":"paucity","def":"n. a scarcity or insufficient quantity of something.","ex":"A paucity of evidence forced the prosecutor to drop the charges."},{"word":"peccadillo","def":"n. a minor fault or trivial offense.","ex":"His tendency to arrive late was a peccadillo his colleagues happily overlooked."},{"word":"pedagogue","def":"n. a teacher, especially a strict, pedantic, or dogmatic one.","ex":"The old pedagogue drilled grammar rules into us with relentless severity."},{"word":"pedant","def":"n. one who flaunts learning or fusses excessively over minor rules.","ex":"The pedant interrupted the talk to correct a trivial point of punctuation."},{"word":"peddle","def":"v. to sell goods, especially in small amounts; to promote or spread.","ex":"Street vendors peddle souvenirs to tourists outside the cathedral."},{"word":"pedestrian","def":"adj. dull, ordinary, or uninspired; commonplace.","ex":"Critics dismissed the novel as pedestrian, lacking any original ideas."},{"word":"pejorative","def":"adj. expressing contempt or disapproval; n. a disparaging word.","ex":"Calling his work amateurish was clearly meant as a pejorative."},{"word":"pellucid","def":"adj. transparently clear in style or meaning; easily understood.","ex":"Her pellucid prose made even quantum physics accessible to beginners."},{"word":"penchant","def":"n. a strong liking or tendency toward something.","ex":"She has a penchant for solving puzzles late into the night."},{"word":"penitent","def":"adj. feeling regret for wrongdoing; n. one who repents.","ex":"The penitent thief returned the stolen goods and apologized sincerely."},{"word":"penumbra","def":"n. a partial shadow; an area of partial obscurity or uncertainty.","ex":"The scandal cast a penumbra of doubt over the entire administration."},{"word":"penury","def":"n. extreme poverty; severe lack of money or resources.","ex":"The once-wealthy family was reduced to penury after the market crash."},{"word":"per","def":"prep. for each; according to or by means of.","ex":"The contractor charged two hundred dollars per hour of labor."},{"word":"perambulate","def":"v. to walk about or stroll, especially leisurely; to traverse on foot.","ex":"Each evening the professor would perambulate the campus, lost in thought."},{"word":"peregrinate","def":"v. to travel or wander from place to place.","ex":"The retired couple loved to peregrinate across Europe with no fixed itinerary."},{"word":"peremptory","def":"adj. insisting on obedience and allowing no refusal; imperiously commanding.","ex":"Her peremptory tone made it clear that further argument was pointless."},{"word":"perennial","def":"adj. lasting or recurring continually; enduring through the years.","ex":"Traffic congestion remains a perennial problem in the growing city."},{"word":"perfidious","def":"adj. deceitful and untrustworthy; treacherous.","ex":"His perfidious ally secretly leaked the plans to their rivals."},{"word":"perfidy","def":"n. deliberate breach of trust; treachery or betrayal.","ex":"The general's perfidy in selling secrets doomed his own troops."},{"word":"perforate","def":"v. to pierce and make a hole or holes through something.","ex":"The machine perforates the paper so the stamps tear off easily."},{"word":"perfunctory","def":"adj. done routinely and with little care or interest.","ex":"He gave the report a perfunctory glance before signing it without comment."},{"word":"peripatetic","def":"adj. traveling from place to place; itinerant; constantly moving.","ex":"His peripatetic career took him to a dozen cities in five years."},{"word":"peripheral","def":"adj. relating to the edge; of minor or secondary importance.","ex":"The committee focused on core goals, ignoring peripheral concerns for now."},{"word":"permeate","def":"v. to spread throughout; to pass through or saturate.","ex":"The smell of fresh bread permeated every room of the house."},{"word":"pernicious","def":"adj. having a harmful effect, especially in a gradual or subtle way.","ex":"The pernicious rumor slowly eroded the candidate's public reputation."},{"word":"perquisite","def":"n. a benefit or privilege gained beyond regular salary; a perk.","ex":"A company car was the most coveted perquisite of the executive role."},{"word":"persiflage","def":"n. light, frivolous, or mocking banter; flippant teasing talk.","ex":"The dinner conversation was pleasant persiflage with no serious subjects raised."},{"word":"perspicacious","def":"adj. having keen insight and shrewd discernment; mentally sharp.","ex":"A perspicacious investor, she spotted the fraud long before others did."},{"word":"perspicuity","def":"n. clarity and lucidity of expression; ease of being understood.","ex":"The textbook is admired for the perspicuity of its difficult explanations."},{"word":"pertinacious","def":"adj. stubbornly persistent; holding firmly to a purpose or opinion.","ex":"Her pertinacious pursuit of the truth eventually exposed the cover-up."},{"word":"pervade","def":"v. to spread through and be present in every part of something.","ex":"A sense of dread pervaded the house after the strange phone call."},{"word":"pervasive","def":"adj. spreading widely and present throughout.","ex":"A pervasive sense of optimism spread through the office after the deal closed."},{"word":"petrify","def":"v. to turn to stone; to paralyze or stun with fear.","ex":"The thought of public speaking petrified him into nervous silence."},{"word":"phalanx","def":"n. a tightly grouped formation of people or things.","ex":"A phalanx of bodyguards surrounded the celebrity as she left the building."},{"word":"philanthropy","def":"n. the desire to promote welfare, expressed through charitable giving.","ex":"Her philanthropy funded scholarships for hundreds of underprivileged students."},{"word":"philistine","def":"n. a person indifferent or hostile to culture and the arts.","ex":"He dismissed the opera as boring, revealing himself as a true philistine."},{"word":"phlegmatic","def":"adj. calm, unemotional, and not easily excited or disturbed.","ex":"His phlegmatic response to the crisis reassured the panicking staff."},{"word":"phony","def":"adj. fake or not genuine; n. an insincere or fraudulent person.","ex":"The salesman's phony enthusiasm failed to convince the wary customers."},{"word":"piddling","def":"adj. trivially small or unimportant; paltry and insignificant.","ex":"They argued for hours over a piddling sum not worth the effort."},{"word":"piebald","def":"adj. having patches of two colors, especially black and white; mixed.","ex":"The piebald horse had striking black and white blotches across its coat."},{"word":"pilfer","def":"v. to steal small items or amounts, usually repeatedly.","ex":"An employee was caught pilfering supplies from the stockroom for months."},{"word":"pillory","def":"v. to expose to public ridicule or scorn; n. a device for public punishment.","ex":"The press pilloried the official for his careless and offensive remarks."},{"word":"pious","def":"adj. devoutly religious; sometimes hypocritically virtuous.","ex":"The pious monk spent hours each day in quiet prayer."},{"word":"piquant","def":"adj. pleasantly sharp or spicy in taste; agreeably stimulating to the mind.","ex":"The sauce had a piquant blend of lime, chili, and ginger."},{"word":"pith","def":"n. the essential or central part; the core of a matter.","ex":"Skip the anecdotes and get to the pith of your argument."},{"word":"pitiless","def":"adj. showing no mercy or compassion; cruel and relentless.","ex":"The pitiless desert sun gave the travelers no chance to rest."},{"word":"placate","def":"v. to soothe or pacify, especially by making concessions.","ex":"The manager offered refunds to placate the angry customers."},{"word":"placid","def":"adj. calm and peaceful; not easily upset.","ex":"The placid lake mirrored the mountains without a single ripple."},{"word":"plagiarize","def":"v. to take and pass off another's work or ideas as one's own.","ex":"The student was expelled for plagiarizing entire passages from a journal."},{"word":"plangent","def":"adj. loud, resonant, and often mournful in sound.","ex":"The plangent toll of the bell echoed sorrowfully across the harbor."},{"word":"plastic","def":"adj. easily shaped or molded; capable of being influenced.","ex":"Young children have remarkably plastic minds that absorb new languages quickly."},{"word":"platitude","def":"n. a trite, overused remark stated as if it were original or profound.","ex":"His speech offered only platitudes like 'follow your dreams' and nothing concrete."},{"word":"plausible","def":"adj. seeming reasonable or believable, though possibly false.","ex":"His excuse was plausible enough that no one questioned it further."},{"word":"plebian","def":"adj. of the common people; unrefined or vulgar; n. a commoner.","ex":"The critic sneered at the film's plebian humor and crude jokes."},{"word":"plethora","def":"n. an excessive or overabundant amount of something.","ex":"The menu offered a plethora of choices that overwhelmed indecisive diners."},{"word":"pliant","def":"adj. easily bent or flexible; readily yielding to influence or change.","ex":"The pliant young vine could be trained to climb the trellis."},{"word":"plucky","def":"adj. showing determined courage in difficult situations.","ex":"The plucky underdog team refused to give up despite trailing badly."},{"word":"plummet","def":"v. to fall or drop straight down rapidly.","ex":"Stock prices plummeted after the company announced disappointing earnings."},{"word":"plutocracy","def":"n. government or rule by the wealthy.","ex":"Critics argued the nation had become a plutocracy serving only the rich."},{"word":"polarize","def":"v. to divide into sharply opposing groups or opinions.","ex":"The controversial policy polarized the town into two hostile camps."},{"word":"polarized","def":"adj. divided into sharply contrasting or opposing groups.","ex":"Public opinion on the proposal was deeply polarized along regional lines."},{"word":"polemic","def":"n. a strong verbal or written attack on a position; controversial argument.","ex":"Her essay was a fierce polemic against the proposed education reforms."},{"word":"polemical","def":"adj. of or involving strongly critical, controversial argument; aggressively disputatious","ex":"Her polemical essay attacked the new policy with relentless, combative force."},{"word":"politic","def":"adj. shrewd, prudent, or judicious, especially in conduct.","ex":"It would be politic to thank your rivals graciously after the vote."},{"word":"polyglot","def":"adj. knowing or using many languages; n. a multilingual person.","ex":"The polyglot diplomat negotiated fluently in five different languages."},{"word":"polymath","def":"n. a person of wide and varied learning across many fields.","ex":"A true polymath, da Vinci excelled in art, anatomy, and engineering."},{"word":"ponderable","def":"adj. able to be weighed or assessed; significant enough to consider.","ex":"The proposal raised ponderable questions about cost that deserved careful thought."},{"word":"ponderous","def":"adj. slow and clumsy due to weight; dull and laborious.","ex":"The professor's ponderous lecture put half the class to sleep."},{"word":"portentous","def":"adj. ominously foreshadowing; pompously solemn or self-important.","ex":"The dark, portentous clouds warned of the storm about to break."},{"word":"poseur","def":"n. one who adopts a false manner or pose to impress others.","ex":"The art critic dismissed him as a poseur who understood nothing of painting."},{"word":"posit","def":"v. to assume or put forward as a basis for argument.","ex":"The theory posits that the universe began with a single explosion."},{"word":"posthumous","def":"adj. occurring or awarded after a person's death.","ex":"The soldier received a posthumous medal for his act of bravery."},{"word":"potentate","def":"n. a ruler or person who possesses great power and authority.","ex":"The foreign potentate arrived with an entourage of guards and advisers."},{"word":"potentiate","def":"v. to increase the power or effect of something, especially a drug.","ex":"Alcohol can dangerously potentiate the sedative effects of these pills."},{"word":"pr","def":"n. public relations; the management of a public image.","ex":"The firm hired a pr team to repair its damaged reputation."},{"word":"pragmatic","def":"adj. dealing with matters practically rather than theoretically or idealistically.","ex":"She took a pragmatic approach, choosing the solution that simply worked."},{"word":"prate","def":"v. to talk foolishly or at tedious length about trivial things.","ex":"He prated on about his vacation while everyone quietly checked their phones."},{"word":"prattle","def":"v. to talk at length in a foolish or trivial way; n. idle chatter.","ex":"The children prattled excitedly about their day at the amusement park."},{"word":"pre-empt","def":"v. to act in advance to prevent or forestall; to take precedence over.","ex":"The company lowered prices to pre-empt its rival's planned launch."},{"word":"preamble","def":"n. an introductory statement or preliminary explanation.","ex":"After a lengthy preamble, the speaker finally reached her main point."},{"word":"precarious","def":"adj. dangerously unstable, insecure, or uncertain.","ex":"The climber clung to a precarious ledge high above the valley."},{"word":"precipitate","def":"v. to cause to happen suddenly; adj. hasty or rash.","ex":"The assassination helped precipitate a war that engulfed the continent."},{"word":"precursor","def":"n. something that comes before and signals another thing's arrival.","ex":"The telegraph was an important precursor to the modern telephone."},{"word":"predestine","def":"v. to determine an outcome in advance, as if by fate or design.","ex":"She felt predestined to become a doctor, just like her parents."},{"word":"predilection","def":"n. a preference or special liking for something.","ex":"He has a predilection for spicy food that surprises his friends."},{"word":"predisposed","def":"adj. inclined or made susceptible to something in advance.","ex":"Her cheerful nature predisposed her to see the best in everyone."},{"word":"preen","def":"v. to groom oneself carefully; to take obvious self-satisfied pride.","ex":"He preened in front of the mirror, admiring his new tailored suit."},{"word":"premeditate","def":"v. to think out or plan an action beforehand, especially a wrongdoing.","ex":"Prosecutors argued the crime was premeditated, not committed in the heat of passion."},{"word":"preponderant","def":"adj. greater in number, weight, force, or influence; predominant.","ex":"The preponderant evidence pointed clearly toward the defendant's guilt."},{"word":"prepossessing","def":"adj. attractive or appealing in appearance; creating a favorable impression.","ex":"Her warm smile and prepossessing manner won over the interview panel."},{"word":"presage","def":"v. to foreshadow or be a sign of a future event; n. an omen.","ex":"The sudden silence of the birds seemed to presage the coming earthquake."},{"word":"prescience","def":"n. foreknowledge of events; the ability to anticipate the future.","ex":"His prescience about the housing collapse spared his clients from ruin."},{"word":"prescient","def":"adj. having knowledge or insight about events before they happen.","ex":"His prescient warning about the crash proved remarkably accurate."},{"word":"presumptive","def":"adj. based on probability or inference rather than certainty.","ex":"She became the presumptive nominee long before the votes were counted."},{"word":"presumptuous","def":"adj. overstepping bounds; excessively bold or arrogant in assumption.","ex":"It was presumptuous of him to assume he had already won the job."},{"word":"pretentious","def":"adj. attempting to impress by affecting greater importance than is real.","ex":"The pretentious critic peppered his review with obscure foreign phrases."},{"word":"preternatural","def":"adj. exceeding what is natural or normal; extraordinary or supernatural.","ex":"The chess prodigy showed a preternatural ability to see ten moves ahead."},{"word":"prevaricate","def":"v. to speak or act evasively to avoid telling the truth; to lie.","ex":"When asked where the money went, he prevaricated instead of answering."},{"word":"primacy","def":"n. the state of being first in importance, order, or rank.","ex":"The constitution asserts the primacy of individual rights ov
