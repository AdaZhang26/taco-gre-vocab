<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f4eee1">
<title>Taco's GRE Vocab Box 🌮</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4eee1; --bg2:#efe7d5;
  --ink:#1e2a23; --ink2:#33403a; --muted:#8b938b;
  --green:#2f4a3d; --green-d:#26402f; --green-l:#3c5a4b;
  --tan:#ead9bf; --tan-ic:#fbf3e6; --tan-ink:#5c4a31;
  --mint:#dce7dd; --mint-ic:#eef4ee;
  --card:#fffdf8; --line:#e7dece; --line2:#ece4d6;
  --terra:#bf6a4e;
  --serif:'Fraunces',ui-serif,Georgia,'Times New Roman',serif;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
body{max-width:600px;margin:0 auto;min-height:100vh;
  background:radial-gradient(120% 60% at 50% 0%,var(--bg) 0%,var(--bg2) 100%);
  padding-bottom:calc(76px + env(safe-area-inset-bottom))}
#app{padding:0 22px}
.pt{padding-top:calc(18px + env(safe-area-inset-top))}

/* top header */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 0 6px}
.brand{display:flex;align-items:center;gap:11px}
.logo{width:40px;height:40px;border-radius:11px;background:var(--green);color:#fff;
  font-family:var(--serif);font-weight:600;font-size:21px;display:flex;align-items:center;justify-content:center}
.brand b{font-family:var(--serif);font-size:19px;font-weight:600;letter-spacing:.2px;line-height:1.05}
.dots{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:var(--card);
  color:var(--ink2);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* hero */
.eyebrow{font-size:12.5px;letter-spacing:2.5px;font-weight:700;color:var(--muted);margin:26px 0 8px}
.hero{font-family:var(--serif);font-weight:600;font-size:54px;line-height:.98;letter-spacing:-.5px;margin:0 0 18px}
.lede{font-size:17px;line-height:1.5;color:var(--ink2);margin:0 0 26px;max-width:34ch}

/* session card */
.sessioncard{background:var(--green);color:#fff;border-radius:24px;padding:24px 22px 22px;position:relative;overflow:hidden;margin-bottom:34px}
.sessioncard .ghostA{position:absolute;right:-6px;bottom:-26px;font-family:var(--serif);font-size:150px;line-height:1;color:rgba(255,255,255,.06);pointer-events:none}
.sc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sc-label{font-size:12px;letter-spacing:2px;font-weight:700;color:rgba(255,255,255,.72)}
.duepill{background:rgba(255,255,255,.14);color:#fff;font-size:12.5px;font-weight:600;padding:6px 13px;border-radius:999px}
.sc-count{font-family:var(--serif);font-size:46px;font-weight:600;line-height:1;margin-bottom:8px}
.sc-sub{font-size:15px;color:rgba(255,255,255,.82);margin-bottom:20px}
.sc-actions{display:flex;gap:12px}
.btn-white{flex:1;background:#fff;color:var(--green);border:0;border-radius:14px;padding:16px;font-size:15.5px;font-weight:700;font-family:var(--sans);cursor:pointer}
.btn-ghost{flex:1;background:transparent;color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:14px;padding:16px;font-size:15.5px;font-weight:600;cursor:pointer}

/* choose mode */
.rowhead{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
.rowhead h2{font-family:var(--serif);font-size:27px;font-weight:600;margin:0}
.muted{color:var(--muted);font-size:14px}
.modes{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px}
.modecard{text-align:left;border:0;border-radius:20px;padding:18px;cursor:pointer;font-family:var(--sans);display:flex;flex-direction:column;gap:8px}
.modecard.tan{background:var(--tan)}
.modecard.mint{background:var(--mint)}
.mc-ic{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:19px;font-weight:600;margin-bottom:24px}
.tan .mc-ic{background:var(--tan-ic);color:var(--tan-ink)}
.mint .mc-ic{background:var(--mint-ic);color:var(--green)}
.mc-title{font-family:var(--serif);font-size:21px;font-weight:600}
.mc-sub{font-size:13.5px;color:var(--ink2);line-height:1.4}

/* stat row */
.statrow{display:flex;background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;margin-bottom:30px}
.statrow>div{flex:1;text-align:center;padding:20px 8px;border-right:1px solid var(--line2)}
.statrow>div:last-child{border-right:0}
.statrow b{display:block;font-family:var(--serif);font-size:30px;font-weight:600}
.statrow span{font-size:12.5px;color:var(--muted)}

/* bottom nav */
#bottomnav{position:fixed;bottom:0;left:0;right:0;max-width:600px;margin:0 auto;
  background:rgba(248,243,233,.92);backdrop-filter:saturate(1.4) blur(12px);
  border-top:1px solid var(--line);display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:30}
#bottomnav button{flex:1;background:0;border:0;cursor:pointer;color:var(--muted);
  display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11.5px;font-weight:600;font-family:var(--sans)}
#bottomnav .ni{font-size:19px;line-height:1}
#bottomnav .ni.aa{font-family:var(--serif);font-weight:600;font-size:18px}
body[data-view="home"] #nav-home,
body[data-view="words"] #nav-words,
body[data-view="progress"] #nav-progress{color:var(--green)}
body[data-view="study"] #bottomnav{display:none}

/* ===== study ===== */
.studybar{display:flex;align-items:center;justify-content:space-between;padding:16px 0 8px}
.backbtn{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px 15px;font-size:14px;font-weight:600;color:var(--ink2);cursor:pointer;font-family:var(--sans)}
.modetoggle{display:flex;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}
.modetoggle button{border:0;background:0;color:var(--muted);font-size:12.5px;font-weight:600;padding:7px 12px;border-radius:999px;cursor:pointer;font-family:var(--sans)}
.modetoggle button.on{background:var(--green);color:#fff}
.progwrap{height:6px;background:var(--card);border:1px solid var(--line);border-radius:99px;overflow:hidden;margin:6px 0 16px}
.progbar{height:100%;background:var(--green);width:0%;transition:width .3s}
.card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:30px 24px;min-height:340px;display:flex;flex-direction:column;justify-content:center;position:relative;box-shadow:0 12px 40px -22px rgba(47,74,61,.4)}
.boxtag{position:absolute;top:16px;right:18px;font-size:11.5px;color:var(--green-l);font-weight:700;letter-spacing:.5px}
.counter{position:absolute;top:16px;left:18px;font-size:11.5px;color:var(--muted)}
.word{font-family:var(--serif);font-size:46px;font-weight:600;text-align:center;line-height:1.08;letter-spacing:-.5px;word-break:break-word}
.posnote{text-align:center;color:var(--muted);font-size:13.5px;margin-top:10px}
.answer{margin-top:24px;border-top:1px solid var(--line);padding-top:18px}
.deflabel{font-size:11px;color:var(--green);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:7px}
.def{font-size:18px;line-height:1.5;color:var(--ink)}
.exlabel{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin:16px 0 6px}
.ex{font-size:15px;line-height:1.55;color:var(--ink2);font-style:italic}
.revealbtn{margin-top:22px;width:100%;padding:16px;border-radius:14px;border:1px solid var(--green);background:transparent;color:var(--green);font-size:15.5px;font-weight:700;cursor:pointer;font-family:var(--sans)}
.speak{display:flex;align-items:center;justify-content:center;gap:8px;margin:12px auto 0;background:var(--card);border:1px solid var(--line);color:var(--ink2);border-radius:99px;padding:12px 22px;font-size:15px;font-weight:600;font-family:var(--sans);cursor:pointer}
.speak span{font-size:18px;line-height:1}
.actions{display:flex;gap:12px;margin-top:14px}
.actions button{flex:1;padding:17px;border:0;border-radius:14px;font-size:15.5px;font-weight:700;cursor:pointer;color:#fff;font-family:var(--sans)}
.btn-no{background:var(--terra)}
.btn-yes{background:var(--green)}
.empty{text-align:center;color:var(--ink2);padding:38px 12px}
.empty h2{font-family:var(--serif);font-weight:600;color:var(--ink);font-size:28px;margin:0 0 8px}
.empty p{color:var(--muted);line-height:1.5}
.undobtn{display:block;width:100%;margin:12px auto 0;background:transparent;border:0;color:var(--muted);font-size:13.5px;font-weight:600;font-family:var(--sans);cursor:pointer;padding:10px;text-decoration:underline;text-underline-offset:3px}
.backbtn2{display:block;width:100%;margin-top:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;font-size:15px;font-weight:600;color:var(--ink2);font-family:var(--sans);cursor:pointer}

/* ===== words list ===== */
.pagehead{font-family:var(--serif);font-size:34px;font-weight:600;margin:14px 0 4px}
.pagesub{color:var(--muted);font-size:14px;margin:0 0 16px}
.search{width:100%;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;font-size:16px;color:var(--ink);font-family:var(--sans);margin-bottom:16px}
.search::placeholder{color:var(--muted)}
.sortrow{display:flex;align-items:center;gap:8px;margin:0 0 14px;font-size:13px;color:var(--muted)}
.sortbtn{background:var(--card);border:1px solid var(--line);border-radius:99px;padding:7px 13px;font-size:12.5px;font-weight:600;color:var(--ink2);font-family:var(--sans);cursor:pointer}
.sortbtn.on{background:var(--green);color:#fff;border-color:var(--green)}
.wi-right{display:flex;align-items:center;gap:7px}
.missct{font-size:11px;font-weight:700;color:var(--terra);background:#f4e1d9;border-radius:999px;padding:4px 9px;white-space:nowrap}
.wstat{font-size:12px;color:var(--muted);margin-top:9px}
#wordlist{display:flex;flex-direction:column;gap:9px}
.wi{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:15px 17px;cursor:pointer}
.wi-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
.wi-word{font-family:var(--serif);font-size:20px;font-weight:600}
.wi-box{font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px;letter-spacing:.4px;white-space:nowrap}
.wi-box.bnew{background:var(--tan);color:var(--tan-ink)}
.wi-box.blearn{background:var(--mint);color:var(--green)}
.wi-box.bmaster{background:var(--green);color:#fff}
.wi .wdef{display:none;margin-top:11px;border-top:1px solid var(--line);padding-top:11px}
.wi.open .wdef{display:block}
.wi .wdef .def{font-size:15.5px}
.wi .wdef .ex{font-size:14px;margin-top:8px}
.wordshead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:14px 0 4px}
.wordshead .pagehead{margin:0}
.addbtn{flex:none;background:var(--green);color:#fff;border:0;border-radius:12px;padding:11px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--sans)}
.customdot{color:var(--green-l);font-size:13px;vertical-align:1px}
.rmbtn{margin-top:12px;background:transparent;border:1px solid var(--terra);color:var(--terra);border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans)}
.sheetbody .fld{width:100%;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px;font-size:16px;color:var(--ink);font-family:var(--sans);margin-bottom:10px;resize:vertical}
.sheetbody .fld::placeholder{color:var(--muted)}
.sheetbody button.primary{background:var(--green);color:#fff;border-color:var(--green)}

/* ===== progress ===== */
.bigmaster{background:var(--green);color:#fff;border-radius:22px;padding:24px;text-align:center;margin-bottom:18px}
.bigmaster .bm-num{font-family:var(--serif);font-size:52px;font-weight:600;line-height:1}
.bigmaster .bm-lab{color:rgba(255,255,255,.8);font-size:14px;margin-top:4px}
.bigmaster .bm-bar{height:8px;background:rgba(255,255,255,.18);border-radius:99px;overflow:hidden;margin-top:16px}
.bigmaster .bm-bar i{display:block;height:100%;background:#fff}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.pcell{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px}
.pcell b{font-family:var(--serif);font-size:28px;font-weight:600;display:block}
.pcell span{font-size:13px;color:var(--muted)}
.boxdist{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:20px}
.boxdist h3{font-family:var(--serif);font-size:18px;font-weight:600;margin:0 0 14px}
.boxrow{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:13px;color:var(--ink2)}
.boxrow .bl{width:70px;color:var(--muted)}
.boxrow .bt{flex:1;height:9px;background:var(--bg2);border-radius:99px;overflow:hidden}
.boxrow .bt i{display:block;height:100%;background:var(--green-l)}
.boxrow .bn{width:30px;text-align:right;font-weight:600}
.pgbtn{width:100%;padding:14px;border-radius:13px;border:1px solid var(--line);background:var(--card);color:var(--ink);font-size:14.5px;font-weight:600;margin-bottom:10px;cursor:pointer;font-family:var(--sans)}
.pgbtn.danger{color:var(--terra);border-color:var(--terra)}

/* sheet + flash */
.sheet{position:fixed;inset:0;background:rgba(30,42,35,.45);display:none;align-items:flex-end;z-index:60}
.sheet.show{display:flex}
.sheetbody{background:var(--bg);width:100%;max-width:600px;margin:0 auto;border-radius:22px 22px 0 0;padding:22px 22px calc(26px + env(safe-area-inset-bottom));max-height:82vh;overflow:auto}
.sheetbody h3{font-family:var(--serif);font-size:23px;font-weight:600;margin:0 0 12px}
.sheetbody p{color:var(--ink2);font-size:14px;line-height:1.6}
.sheetbody button{width:100%;padding:14px;border-radius:12px;border:1px solid var(--line);background:var(--card);color:var(--ink);font-size:14.5px;font-weight:600;margin-top:10px;cursor:pointer;font-family:var(--sans)}
.goalgrid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:9px;margin:6px 0 4px}
.goalgrid .goalopt{width:auto;margin:0;padding:14px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;border:1px solid var(--line);border-radius:14px;background:var(--card);font-family:var(--serif);font-size:22px;font-weight:600;color:var(--ink)}
.goalgrid .goalopt span{font-family:var(--sans);font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.3px}
.goalgrid .goalopt.on{background:var(--green);color:#fff;border-color:var(--green)}
.goalgrid .goalopt.on span{color:rgba(255,255,255,.8)}
.estbox{background:var(--mint);border-radius:14px;padding:14px 16px;font-size:13.5px;line-height:1.55;color:var(--ink);margin:6px 0 4px}
.estline{display:block;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 17px;margin:14px 0 30px;font-size:13.5px;line-height:1.55;color:var(--ink2);cursor:pointer;font-family:var(--sans)}
.estline b{color:var(--ink)}
.estedit{display:inline-block;margin-top:7px;color:var(--green);font-weight:700;font-size:13px}
.flash{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:11px 18px;border-radius:99px;font-size:13.5px;opacity:0;transition:.3s;pointer-events:none;z-index:70;max-width:90%}
.flash.show{opacity:1}
.boo{position:fixed;inset:0;background:rgba(30,42,35,.74);display:none;align-items:center;justify-content:center;z-index:90;padding:24px}
.boo.show{display:flex}
.boo-card{background:var(--card);border-radius:26px;padding:16px 16px 18px;max-width:330px;width:100%;text-align:center;box-shadow:0 24px 70px -18px rgba(0,0,0,.55);animation:boopop .4s cubic-bezier(.2,1.1,.3,1)}
@keyframes boopop{from{transform:scale(.82);opacity:0}to{transform:scale(1);opacity:1}}
.boo-img{width:100%;border-radius:18px;display:block;margin-bottom:14px}
.boo-cap{font-family:var(--serif);font-size:25px;font-weight:600;color:var(--green);line-height:1.18;margin-bottom:5px}
.boo-sub{font-size:13.5px;color:var(--muted);margin-bottom:16px}
.boo-btn{width:100%;padding:15px;border:0;border-radius:14px;background:var(--green);color:#fff;font-size:16px;font-weight:700;font-family:var(--sans);cursor:pointer}
@media(max-width:380px){.hero{font-size:46px}.word{font-size:40px}}
</style>
</head>
<body data-view="home">
<div id="app"></div>
<nav id="bottomnav">
  <button id="nav-home" onclick="showView('home')"><span class="ni">&#8962;</span>Home</button>
  <button id="nav-words" onclick="showView('words')"><span class="ni aa">Aa</span>Words</button>
  <button id="nav-progress" onclick="showView('progress')"><span class="ni">&#8599;</span>Progress</button>
</nav>
<div class="sheet" id="sheet" onclick="if(event.target===this)hideSheet()"><div class="sheetbody" id="sheetbody"></div></div>
<div class="flash" id="flash"></div>
<div class="boo" id="boo" onclick="if(event.target===this)hideBoo()"></div>

<script>

ed that every transaction was completely aboveboard."},{"word":"abrade","def":"v. to wear away or scrape by friction; to erode","ex":"Years of wind and sand had abraded the smooth surface of the statue."},{"word":"abrasive","def":"adj. harsh or grating in manner; causing wear by rubbing","ex":"His abrasive comments alienated coworkers who preferred a gentler tone."},{"word":"abreast","def":"adv. up to date with the latest information; side by side","ex":"Reading journals helps her stay abreast of new developments in the field."},{"word":"abridge","def":"v. to shorten while retaining the essence; to curtail (a right)","ex":"The publisher decided to abridge the thousand-page novel for younger readers."},{"word":"abrogate","def":"v. to abolish or annul formally, especially a law or agreement","ex":"The new government moved quickly to abrogate the unpopular treaty."},{"word":"abscission","def":"n. the act of cutting off; natural shedding of leaves or fruit","ex":"The abscission of leaves in autumn is triggered by shortening daylight."},{"word":"abscond","def":"v. to depart secretly and hide, often to avoid the law","ex":"The treasurer absconded with the company funds before the audit began."},{"word":"abstain","def":"v. to refrain deliberately from doing something","ex":"He decided to abstain from voting because he lacked enough information."},{"word":"abstemious","def":"adj. moderate or sparing, especially in eating and drinking","ex":"His abstemious diet consisted of little more than bread and water."},{"word":"abstruse","def":"adj. difficult to understand; obscure or recondite","ex":"The professor's abstruse lecture on quantum fields baffled most of the class."},{"word":"abyss","def":"n. a deep, immeasurable space, gulf, or chasm","ex":"Staring into the dark abyss of the canyon made her dizzy with fear."},{"word":"accede","def":"v. to agree or consent; to assume an office or position","ex":"The manager finally acceded to the team's request for flexible hours."},{"wor aclysmal eruption buried the entire city beneath molten ash within hours."},{"word":"catalyst","def":"n. an agent that provokes or speeds change without being consumed.","ex":"Her speech was the catalyst for sweeping reforms across the institution."},{"word":"caterwaul","def":"v. to make a harsh, shrill cry; to quarrel noisily.","ex":"The stray cats caterwauled outside my window, keeping the whole street awake."},{"word":"catholic","def":"adj. broad or wide-ranging in tastes or interests; universal.","ex":"His catholic reading spanned physics, poetry, and medieval cookbooks."},{"word":"caustic","def":"adj. sarcastic and biting; capable of burning or corroding.","ex":"The critic's caustic review left the playwright stinging for weeks."},{"word":"cavil","def":"v. to raise petty or trivial objections; n. a trifling complaint.","ex":"Rather than debate the policy's merits, he merely caviled over its wording."},{"word":"censure","def":"v. to criticize harshly; n. strong disapproval.","ex":"The committee voted to censure the official for his misconduct."},{"word":"ceremonious","def":"adj. excessively formal, elaborate, or punctilious about formalities.","ex":"The ambassador's ceremonious bow seemed almost theatrical to the casual guests."},{"word":"certitude","def":"n. absolute certainty or conviction.","ex":"She spoke with such certitude that no one dared question her conclusion."},{"word":"chary","def":"adj. cautiously reluctant; wary or sparing.","ex":"Burned once before, he was chary of lending money to old acquaintances."},{"word":"chauvinism","def":"n. excessive, biased loyalty to one's group or cause.","ex":"His chauvinism blinded him to the merits of foreign traditions."},{"word":"chauvinistic","def":"adj. marked by aggressive or biased loyalty to one's group, nation, or sex.","ex":"His chauvinistic remarks dismissed every foreign achievement as inferior to his own country's."},{"word":"cherubic","def":"adj. having a sweet, innocent, chubby-faced appearance, like  the room."},{"word":"comity","def":"n. courteous, harmonious behavior; mutual civility, especially between nations.","ex":"The treaty was negotiated in a spirit of comity rather than rivalry."},{"word":"commensurate","def":"adj. proportionate; corresponding in size or degree.","ex":"Her salary was commensurate with her years of experience."},{"word":"commingle","def":"v. to mix or blend together.","ex":"The accountant was fired for commingling client funds with the firm's own accounts."},{"word":"commiserate","def":"v. to express sympathy or compassion for another's misfortune.","ex":"After the loss, teammates gathered to commiserate over the season's bitter ending."},{"word":"commodious","def":"adj. spacious and roomy; comfortable.","ex":"The commodious suite easily accommodated the entire family and all their luggage."},{"word":"commonsensical","def":"adj. agreeing with or based on sound, practical judgment.","ex":"Her commonsensical advice to save before spending struck everyone as obviously wise."},{"word":"compendium","def":"n. a concise but comprehensive summary of a subject.","ex":"The handbook is a compendium of every rule governing the sport."},{"word":"complacent","def":"adj. self-satisfied and unaware of potential dangers.","ex":"Success made the company complacent, and rivals soon overtook it."},{"word":"complaisance","def":"n. willingness to please others; obliging agreeableness.","ex":"His complaisance made him popular, though some mistook his agreeableness for weakness."},{"word":"complaisant","def":"adj. eager to please; obligingly agreeable.","ex":"The complaisant host accommodated every guest's odd request."},{"word":"complementary","def":"adj. combining so as to complete or enhance each other.","ex":"Their complementary skills made them an unbeatable design team."},{"word":"compliant","def":"adj. inclined to obey or yield; conforming to rules.","ex":"The compliant employee followed every directive without question."},{"word":"compunction","def":"n. a feeling of guilt or moral scruple that prevents or follows wrongdoing.","ex":"The thief showed no compunction about stealing from his own relatives."},{"word":"concatenate","def":"v. to link or join together in a connected series or chain.","ex":"The program concatenates the first and last names into a single string."},{"word":"concede","def":"v. to admit as true; to yield or surrender something.","ex":"He finally conceded that his rival's plan was superior."},{"word":"conciliate","def":"v. to placate or win over; to reconcile disputing parties.","ex":"The mediator worked to conciliate the feuding partners before the company collapsed."},{"word":"conciliatory","def":"adj. intended to placate or reconcile.","ex":"Her conciliatory tone eased the tension between the feuding partners."},{"word":"concoct","def":"v. to invent or devise; to prepare by mixing ingredients.","ex":"He concocted an elaborate excuse to explain his unexplained weekend absence."},{"word":"concur","def":"v. to agree; to happen at the same time.","ex":"The experts concur that the climate is warming rapidly."},{"word":"condign","def":"adj. deserved and appropriate, especially of punishment.","ex":"The court imposed condign punishment proportional to the severity of the crime."},{"word":"condole","def":"v. to express sympathy or sorrow with someone grieving.","ex":"Neighbors came to condole with the widow after her husband's sudden death."},{"word":"condone","def":"v. to overlook or tacitly approve of wrongdoing.","ex":"The school refused to condone cheating, expelling the offenders."},{"word":"confer","def":"v. to grant or bestow; to consult or discuss together.","ex":"The university conferred an honorary degree upon the scientist."},{"word":"conflate","def":"v. to combine or confuse two distinct things into one.","ex":"Critics warned against conflating correlation with causation in the study's findings."},{"word":"confound","def":"v. to confuse or perplex; to mix up or thwart.","ex":"The results confounded researchers who expected the opposite outcome."},{"word":"congeal","def":"v. to solidify or thicken, especially by cooling.","ex":"The gravy began to congeal into a sticky film as the dinner grew cold."},{"word":"connive","def":"v. to conspire or scheme secretly; to cooperate in wrongdoing.","ex":"The officials connived to hide the budget shortfall from public auditors."},{"word":"connoisseur","def":"n. an expert judge in matters of taste.","ex":"A connoisseur of wine, she detected the vintage at first sip."},{"word":"connote","def":"v. to imply or suggest beyond the literal meaning.","ex":"The word 'home' connotes warmth that 'house' does not."},{"word":"consilience","def":"n. the convergence of evidence from independent sources to support a conclusion.","ex":"The theory gained authority through the consilience of geology, biology, and physics."},{"word":"console","def":"v. to comfort someone in grief or disappointment.","ex":"Friends gathered to console the family after their loss."},{"word":"consolidate","def":"v. to combine into a single stronger whole; to strengthen.","ex":"The merger consolidated three small banks into one giant firm."},{"word":"constrict","def":"v. to make narrower; to limit or restrict.","ex":"Tight regulations constricted the startup's ability to grow."},{"word":"constringe","def":"v. to cause to contract or shrink; to constrict.","ex":"Cold temperatures constringe the blood vessels near the skin's surface."},{"word":"construe","def":"v. to interpret or understand in a particular way.","ex":"Her silence was construed as agreement, though she objected inwardly."},{"word":"contentious","def":"adj. likely to cause argument; quarrelsome.","ex":"Immigration remains a contentious issue dividing the legislature."},{"word":"contextualize","def":"v. to place in a context that aids understanding.","ex":"The historian contextualized the speech within its turbulent era."},{"word":"contort","def":"v. to twist or bend out of normal shape.","ex":"Pain contorted his face as the doctor reset the dislocated shoulder."},{"word":"contraries","def":"n. things that are opposite or mutually exclusive.","ex":"Hope and despair stood as contraries warring within him."},{"word":"contravene","def":"v. to violate, oppose, or conflict with a law or principle.","ex":"Dumping waste in the river contravenes several environmental protection statutes."},{"word":"contrite","def":"adj. feeling deep remorse for wrongdoing.","ex":"His contrite apology revealed genuine regret for the harm caused."},{"word":"contumacious","def":"adj. stubbornly disobedient to authority; rebellious.","ex":"The contumacious witness refused to answer despite the judge's repeated orders."},{"word":"conundrum","def":"n. a confusing and difficult problem or riddle.","ex":"Balancing growth with sustainability is a modern economic conundrum."},{"word":"convalesce","def":"v. to recover gradually from illness or injury.","ex":"She spent two weeks convalescing at the seaside after her major surgery."},{"word":"converge","def":"v. to come together toward a common point.","ex":"Thousands of marchers converged on the capital at noon."},{"word":"conversant","def":"adj. familiar with or knowledgeable about a subject.","ex":"The new analyst is thoroughly conversant with the latest tax regulations."},{"word":"conversely","def":"adv. introducing an opposite or contrasting statement.","ex":"City life offers convenience; conversely, it brings constant noise."},{"word":"convivial","def":"adj. friendly, lively, and enjoyable; fond of feasting and good company","ex":"The convivial host kept the dinner party laughing late into the night."},{"word":"convoke","def":"v. to call together or summon a formal meeting or assembly.","ex":"The president convoked the cabinet to address the unfolding economic crisis."},{"word":"convoluted","def":"adj. excessively complicated and hard to follow.","ex":"The contract's convoluted clauses baffled even seasoned lawyers."},{"word":"convulsion","def":"n. a violent, involuntary contraction of muscles; a violent disturbance.","ex":"The fever brought on a sudden convulsion that frightened the child's parents."},{"word":"copious","def":"adj. abundant; present in large quantities.","ex":"She took copious notes during the three-hour lecture."},{"word":"coquette","def":"n. a woman who flirts in a playful, insincere manner.","ex":"The notorious coquette charmed every suitor without intending to marry any of them."},{"word":"corroborate","def":"v. to confirm or support with evidence.","ex":"Two witnesses corroborated the driver's account of the crash."},{"word":"cosmopolitan","def":"adj. worldly and sophisticated; encompassing many cultures.","ex":"The cosmopolitan port city teemed with languages from every continent."},{"word":"cosset","def":"v. to pamper, coddle, or treat with excessive care.","ex":"Critics said the wealthy heir had been cosseted his entire sheltered life."},{"word":"coterie","def":"n. a small, exclusive group sharing interests.","ex":"A coterie of loyal artists gathered nightly at her salon."},{"word":"countenance","def":"n. a person's face or expression; v. to tolerate or approve.","ex":"The principal would not countenance any form of bullying."},{"word":"counterintuitive","def":"adj. contrary to what intuition would expect.","ex":"It seems counterintuitive, but spending more here saves money later."},{"word":"countermand","def":"v. to revoke or reverse a previous command or order.","ex":"The general countermanded the retreat once reinforcements unexpectedly arrived at the front."},{"word":"counterpoint","def":"n. a contrasting element that offsets another.","ex":"Her calm served as a counterpoint to his frantic energy."},{"word":"counterproductive","def":"adj. having the opposite of the intended effect.","ex":"Punishing curiosity is counterproductive to genuine learning."},{"word":"countervail","def":"v. to counteract or offset with equal force or effect.","ex":"Higher tariffs were meant to countervail the foreign government's unfair subsidies."},{"word":"covert","def":"adj. secret or concealed; not openly shown.","ex":"The agency ran a covert operation no official would acknowledge."},{"word":"covetous","def":"adj. having an intense, often greedy, desire for others' possessions.","ex":"His covetous glances at his neighbor's new car betrayed his jealousy."},{"word":"cozen","def":"v. to deceive, cheat, or trick by petty means.","ex":"The swindler cozened the trusting widow out of her entire savings."},{"word":"crafty","def":"adj. clever in a sly or deceitful way.","ex":"The crafty merchant hid the defects until the sale closed."},{"word":"craven","def":"adj. shamefully cowardly.","ex":"His craven retreat left his allies to face the danger alone."},{"word":"credibility","def":"n. the quality of being trusted or believed.","ex":"Repeated lies destroyed the politician's credibility with voters."},{"word":"credulous","def":"adj. too ready to believe things; gullible.","ex":"Credulous investors poured money into the scheme without checking a single fact."},{"word":"crescendo","def":"n. a gradual increase to a peak of intensity.","ex":"The protest swelled to a crescendo as more crowds arrived."},{"word":"crestfallen","def":"adj. dejected, dispirited, or downcast after disappointment.","ex":"Crestfallen after the rejection letter, she barely spoke for the rest of the day."},{"word":"croon","def":"v. to sing or hum softly in a low, soothing voice.","ex":"The mother crooned a gentle lullaby until the baby finally drifted asleep."},{"word":"crumple","def":"v. to crush into wrinkles or folds; to collapse.","ex":"He crumpled the rejected draft and tossed it angrily into the bin."},{"word":"culminate","def":"v. to reach the highest or final point.","ex":"Years of training culminated in an Olympic gold medal."},{"word":"cupidity","def":"n. excessive greed for wealth or possessions.","ex":"His cupidity drove him to defraud even his closest friends."},{"word":"curmudgeon","def":"n. a bad-tempered, surly, or grumpy person.","ex":"The old curmudgeon shouted at any child who stepped onto his lawn."},{"word":"cynical","def":"adj. distrustful of others' motives; believing people act selfishly.","ex":"Years in politics left her cynical about every grand promise."},{"word":"dappled","def":"adj. marked with spots or patches of varied color or light.","ex":"Sunlight fell in dappled patterns through the leaves onto the forest floor."},{"word":"daunt","def":"v. to intimidate or discourage; to make fearful.","ex":"The sheer height of the cliff daunted even the experienced climbers."},{"word":"dawdle","def":"v. to waste time; to move or act slowly and idly.","ex":"Stop dawdling over breakfast or we'll miss the early train entirely."},{"word":"debark","def":"v. to disembark; to get off a ship, plane, or vehicle.","ex":"Passengers debarked the cruise ship single file under the morning sun."},{"word":"debase","def":"v. to lower in quality, value, character, or dignity.","ex":"Flooding the market with counterfeit coins debased the currency's real worth."},{"word":"debilitate","def":"v. to weaken or sap the strength of.","ex":"The prolonged illness debilitated him so severely that walking became exhausting."},{"word":"debonair","def":"adj. suave, charming, and self-assured in manner; sophisticated.","ex":"The debonair host greeted his guests with effortless charm and a winning smile."},{"word":"debunk","def":"v. to expose as false or exaggerated.","ex":"The scientist debunked the myth with carefully controlled experiments."},{"word":"declaim","def":"v. to speak pompously or recite formally and rhetorically.","ex":"He declaimed against corruption from atop the courthouse steps."},{"word":"declivity","def":"n. a downward slope.","ex":"The cart rolled freely down the gentle declivity toward the river."},{"word":"decorous","def":"adj. proper, dignified, and in good taste; well-behaved.","ex":"The mourners maintained a decorous silence throughout  something derived from another source.","ex":"Critics dismissed the film as a derivative copy of earlier classics."},{"word":"desecrate","def":"v. to violate the sanctity of; to treat something sacred with disrespect.","ex":"Vandals desecrated the cemetery, toppling headstones and spraying graffiti on the chapel."},{"word":"desiccate","def":"v. to dry out thoroughly; to drain of vitality.","ex":"The scorching summer desiccated the once-green fields into cracked, lifeless dust."},{"word":"desultory","def":"adj. lacking a plan or purpose; aimless and disconnected.","ex":"Their desultory conversation wandered from topic to topic without ever settling."},{"word":"detached","def":"adj. emotionally uninvolved; aloof and objective.","ex":"The surgeon remained detached, focusing solely on the procedure."},{"word":"deterrent","def":"n. something that discourages an action through fear of consequences.","ex":"Steep fines act as a deterrent against illegal dumping."},{"word":"dexterous","def":"adj. skillful and nimble, especially with the hands; mentally adroit.","ex":"The dexterous surgeon tied the tiny sutures with remarkable speed and precision."},{"word":"diabolic","def":"adj. devilish; extremely wicked or cruel.","ex":"The villain devised a diabolic plan to poison the entire city's water supply."},{"word":"diaphanous","def":"adj. light, delicate, and translucent; almost transparent.","ex":"She wore a diaphanous veil through which the candlelight softly glimmered."},{"word":"diatribe","def":"n. a bitter, abusive verbal attack.","ex":"His diatribe against the media lasted nearly an hour."},{"word":"dichotomy","def":"n. a division into two sharply opposed parts.","ex":"The novel explores the dichotomy between duty and desire."},{"word":"dictum","def":"n. a formal or authoritative pronouncement; a saying.","ex":"The architect lived by the dictum that form follows function."},{"word":"didactic","def":"adj. intended to instruct, often moralizingly.","ex":"The fable's didactic for a response."},{"word":"discomfiting","def":"adj. causing unease or embarrassment.","ex":"She asked a discomfiting question that left him fumbling for words."},{"word":"discommode","def":"v. to cause inconvenience or trouble to.","ex":"The road closure discommoded commuters, forcing lengthy detours through narrow side streets."},{"word":"discompose","def":"v. to disturb the composure of; to agitate or unsettle.","ex":"Nothing could discompose the veteran pilot, even as the engine sputtered and stalled."},{"word":"disconcert","def":"v. to unsettle, fluster, or throw into confusion.","ex":"The interviewer's piercing stare disconcerted the applicant during the difficult questions."},{"word":"discordant","def":"adj. clashing or harshly inharmonious.","ex":"The discordant notes signaled the orchestra's lack of rehearsal."},{"word":"discredit","def":"v. to harm the reputation of; to cast doubt on.","ex":"Opponents tried to discredit the study by questioning its funding."},{"word":"discrepancy","def":"n. a lack of agreement or consistency.","ex":"An auditor noticed a discrepancy between the receipts and the ledger."},{"word":"discrete","def":"adj. separate and distinct.","ex":"The course is divided into five discrete modules."},{"word":"discriminating","def":"adj. showing refined, selective taste or judgment.","ex":"A discriminating diner, he could name every spice in the dish."},{"word":"disenchant","def":"v. to free from illusion; to leave disappointed or disillusioned.","ex":"Years of broken promises disenchanted voters who had once admired the senator."},{"word":"disgorge","def":"v. to discharge or pour forth violently; to give up (something stolen or ill-gotten) under pressure.","ex":"The pipe disgorged a torrent of muddy water onto the street."},{"word":"disgruntle","def":"v. to make discontented, sulky, or annoyed.","ex":"The sudden pay cut disgruntled even the most loyal employees."},{"word":"dishearten","def":"v. to cause to lose courage, hope, or enthusiasm.","ex":"Repeated rejections disheartened the young novelist, who nearly abandoned writing."},{"word":"disinclination","def":"n. a reluctance or unwillingness to do something.","ex":"Her disinclination to travel meant she rarely left her hometown."},{"word":"disingenuous","def":"adj. insincere; pretending ignorance or honesty.","ex":"It was disingenuous to claim surprise when he planned it all."},{"word":"disinter","def":"v. to dig up from a grave; to bring to light something hidden or forgotten.","ex":"Historians disinterred old letters that revealed the senator's secret dealings."},{"word":"disinterested","def":"adj. impartial; free from bias or self-interest.","ex":"A disinterested mediator helped settle the bitter dispute."},{"word":"disjointed","def":"adj. lacking coherence or logical connection.","ex":"His disjointed explanation left the audience thoroughly confused."},{"word":"disjunctive","def":"adj. marked by separation or division; tending to disjoin.","ex":"The essay's disjunctive structure left readers struggling to connect its ideas."},{"word":"dismiss","def":"v. to reject as unworthy of consideration; to send away.","ex":"She dismissed the rumor as baseless gossip."},{"word":"disparage","def":"v. to belittle or speak of in a slighting, dismissive way.","ex":"Critics disparage the film as shallow, but audiences clearly adore it."},{"word":"disparate","def":"adj. fundamentally distinct or different in kind; not comparable.","ex":"The committee struggled to reconcile the disparate interests of farmers and developers."},{"word":"dispassionate","def":"adj. free from emotion or bias; calm and impartial.","ex":"A good judge offers a dispassionate analysis untainted by personal feeling."},{"word":"dispatch","def":"v. to send off promptly; to deal with quickly; n. promptness or a message.","ex":"She dispatched the urgent report and handled every objection with remarkable dispatch."},{"word":"disperse","def":"v. to scatter or spread widely; to break up and move apart.","ex":"Police used loudspeakers to disperse the crowd gathered in the square."},{"word":"disposition","def":"n. a person's inherent temperament; a tendency or arrangement.","ex":"Her cheerful disposition made even tedious meetings feel surprisingly pleasant."},{"word":"disquieting","def":"adj. causing anxiety or unease; troubling.","ex":"The report contained disquieting evidence that the bridge was structurally unsound."},{"word":"disquisition","def":"n. a long or elaborate formal discussion or essay on a subject.","ex":"The professor delivered a lengthy disquisition on medieval trade routes."},{"word":"dissemble","def":"v. to conceal one's true feelings or motives; to disguise.","ex":"He dissembled his disappointment, smiling as if nothing were wrong."},{"word":"disseminate","def":"v. to spread or distribute widely, especially information.","ex":"The agency used social media to disseminate warnings about the approaching storm."},{"word":"dissent","def":"v. to disagree or withhold assent; n. difference of opinion.","ex":"Three justices dissented, arguing the ruling ignored longstanding precedent."},{"word":"dissolute","def":"adj. lacking moral restraint; indulging in sensual pleasures or vices.","ex":"His dissolute lifestyle of gambling and drinking ruined the family fortune."},{"word":"dissolution","def":"n. the breaking up or termination of something; disintegration.","ex":"The dissolution of the partnership left both founders pursuing separate ventures."},{"word":"dissonance","def":"n. lack of harmony or agreement; harsh, clashing sound.","ex":"There was a jarring dissonance between his lofty ideals and his actual conduct."},{"word":"distaff","def":"adj. relating to women or the maternal side; n. women's work or domain.","ex":"She inherited the estate through the distaff line of the family."},{"word":"distain","def":"v. to stain or sully; to dishonor or tarnish.","ex":"The scandal distained a reputation he had spent decades building."},{"word":"distend","def":"v. to swell or expand by stretching, especially from internal pressure.","ex":"Hunger had distended the children's bellies in the famine-stricken village."},{"word":"distill","def":"v. to extract the essential meaning; to purify by distillation.","ex":"The professor could distill a century of theory into a single lucid lecture."},{"word":"dither","def":"v. to act indecisively or hesitate; n. a state of agitated indecision.","ex":"Stop dithering and choose, because the offer expires at midnight."},{"word":"diurnal","def":"adj. occurring during the daytime; recurring daily.","ex":"Most songbirds are diurnal, foraging busily while owls sleep."},{"word":"diverge","def":"v. to move or extend in different directions; to differ.","ex":"Their opinions began to diverge sharply as the debate wore on."},{"word":"divest","def":"v. to deprive or rid of something; to sell off assets.","ex":"The university voted to divest its holdings in fossil-fuel companies."},{"word":"divestiture","def":"n. the act of selling off or relinquishing assets, rights, or holdings.","ex":"The court ordered the divestiture of the company's monopolistic subsidiaries."},{"word":"divine","def":"v. to discover by intuition or insight; adj. of or like a god.","ex":"She could somehow divine her clients' wishes before they spoke them."},{"word":"doctrinaire","def":"adj. rigidly devoted to a theory or doctrine without regard to practicality.","ex":"His doctrinaire insistence on the rules ignored the situation's real complexities."},{"word":"document","def":"v. to record or support with evidence; n. a written record.","ex":"Researchers carefully document each experiment to ensure their findings can be replicated."},{"word":"dodder","def":"v. to tremble or move feebly and unsteadily, as from age.","ex":"The elderly man doddered across the icy sidewalk, clutching his cane."},{"word":"doff","def":"v. to take off or remove, especially a hat or clothing.","ex":"He doffed his cap politely as the procession passed by."},{"word":"dogma","def":"n. a principle or set of beliefs laid down as incontrovertibly true.","ex":"He questioned the prevailing economic dogma that markets always self-correct."},{"word":"doldrums","def":"n. a state of low spirits, stagnation, or inactivity.","ex":"Sales fell into the doldrums during the long winter months."},{"word":"dolorous","def":"adj. expressing or causing great sorrow or distress.","ex":"The widow's dolorous cries echoed through the silent chapel."},{"word":"dolt","def":"n. a stupid or foolish person.","ex":"Only a dolt would lock his keys inside a running car."},{"word":"domineer","def":"v. to rule or control others in an arrogant, overbearing way.","ex":"The manager domineered over his staff, dismissing every suggestion they offered."},{"word":"dormant","def":"adj. temporarily inactive or sleeping; latent.","ex":"The volcano lay dormant for centuries before erupting without warning."},{"word":"dovetail","def":"v. to fit together neatly; to combine harmoniously.","ex":"Her research interests dovetail nicely with the lab's current projects."},{"word":"dovish","def":"adj. favoring peaceful or conciliatory policies rather than aggression.","ex":"The dovish diplomats pushed for negotiation instead of military intervention."},{"word":"doyen","def":"n. the most respected or senior member of a group or profession.","ex":"She was the doyen of theater critics, her reviews shaping careers."},{"word":"drench","def":"v. to wet thoroughly; to saturate or soak completely.","ex":"A sudden downpour drenched the hikers before they reached shelter."},{"word":"droll","def":"adj. amusing in an odd or whimsical way.","ex":"His droll remarks kept the otherwise dull dinner party lively."},{"word":"drollness","def":"n. amusing or whimsical quality; comical oddity.","ex":"The play's drollness lay in its absurd, deadpan dialogue."},{"word":"dubious","def":"adj. doubtful or uncertain; of questionable quality or honesty.","ex":"The salesman made dubious claims about the gadget's miraculous benefits."},{"word":"ductile","def":"adj. capable of being drawn out or shaped; easily molded or influenced.","ex":"Copper is ductile enough to be drawn into fine wire."},{"word":"dulcet","def":"adj. sweet and soothing, especially to the ear.","ex":"Her dulcet voice lulled the restless infant to sleep."},{"word":"dullard","def":"n. a slow-witted or stupid person.","ex":"The teacher patiently re-explained the lesson to the class dullard."},{"word":"dupe","def":"v. to deceive or trick; n. a person who is easily fooled.","ex":"Scammers duped hundreds of investors with promises of guaranteed returns."},{"word":"duplicitous","def":"adj. deceitful; given to double-dealing or deliberate deception.","ex":"His duplicitous promises masked a plan to betray his partners."},{"word":"duplicity","def":"n. deceitfulness; double-dealing or deliberate deception.","ex":"Her apparent loyalty masked a duplicity that betrayed her closest allies."},{"word":"dyspeptic","def":"adj. irritable or gloomy in disposition; suffering from indigestion.","ex":"The dyspeptic critic found fault with every dish he tasted."},{"word":"earsplitting","def":"adj. extremely loud; painfully harsh to the ears.","ex":"The earsplitting blast of the siren made everyone cover their ears."},{"word":"ebullient","def":"adj. cheerful and full of energy; overflowing with enthusiasm.","ex":"The ebullient host greeted each guest with infectious excitement."},{"word":"eccentric","def":"adj. unconventional or odd in behavior; n. an odd person.","ex":"The eccentric inventor filled his house with bizarre, half-finished machines."},{"word":"echelon","def":"n. a level or rank within an organization or hierarchy.","ex":"She rose quickly into the upper echelon of corporate management."},{"word":"eclat","def":"n. brilliant or conspicuous success; dazzling display or acclaim.","ex":"The pianist performed the concerto with such eclat that audiences cheered."},{"word":"eclectic","def":"adj. drawing from a wide and diverse range of sources.","ex":"His eclectic taste in music spanned jazz, opera, and punk."},{"word":"eclipse","def":"v. to surpass or overshadow; n. an obscuring of light.","ex":"Her later novels eclipsed the modest success of her debut."},{"word":"edify","def":"v. to instruct or improve morally or intellectually.","ex":"The lecture aimed to edify students rather than merely entertain them."},{"word":"efface","def":"v. to erase or rub out; to make inconspicuous.","ex":"Time had effaced the inscription carved into the ancient stone."},{"word":"effervesce","def":"v. to bubble or fizz; to show lively high spirits.","ex":"The champagne effervesced as it filled the crystal flutes."},{"word":"effete","def":"adj. lacking vigor or effectiveness; decadent and self-indulgent.","ex":"Critics dismissed the aristocracy as an effete and useless class."},{"word":"efficacy","def":"n. the ability to produce a desired or intended result.","ex":"Clinical trials confirmed the vaccine's efficacy against the new variant."},{"word":"effigy","def":"n. a crude representation of a person, often used in protest.","ex":"Protesters burned an effigy of the unpopular dictator in the plaza."},{"word":"effluvium","def":"n. an unpleasant or noxious odor or vapor.","ex":"A foul effluvium rose from the stagnant, polluted marsh."},{"word":"effrontery","def":"n. shameless boldness; insolent audacity.","ex":"He had the effrontery to demand a raise after arriving late daily."},{"word":"effulgent","def":"adj. shining brilliantly; radiant.","ex":"The effulgent sunrise bathed the snowy peaks in golden light."},{"word":"egalitarian","def":"adj. believing in or promoting equal rights and opportunities.","ex":"The new policy reflected the company's egalitarian commitment to equal pay."},{"word":"egoistic","def":"adj. excessively concerned with oneself; self-centered.","ex":"His egoistic remarks revealed that he cared only about his own success."},{"word":"egregious","def":"adj. outstandingly bad; conspicuously and shockingly wrong.","ex":"The auditor uncovered egregious errors that had gone unnoticed for years."},{"word":"egress","def":"n. a way out or exit; the act of going out.","ex":"Building codes require clearly marked egress in case of fire."},{"word":"elate","def":"v. to make extremely happy or proud.","ex":"News of her acceptance elated the entire family for days."},{"word":"elated","def":"adj. extremely happy and excited; joyful.","ex":"She was elated when the acceptance letter finally arrived."},{"word":"eleemosynary","def":"adj. relating to or dependent on charity; charitable.","ex":"The hospital ran an eleemosynary clinic for patients who could not pay."},{"word":"elegy","def":"n. a mournful poem or song, especially a lament for the dead.","ex":"The poet composed a haunting elegy for his fallen comrades."},{"word":"elephantine","def":"adj. huge, clumsy, or ponderous like an elephant.","ex":"The bureaucracy moved with elephantine slowness on even simple requests."},{"word":"elevate","def":"v. to raise to a higher level, position, or status.","ex":"The award elevated her from obscurity to international acclaim."},{"word":"elicit","def":"v. to draw out or evoke a response, fact, or reaction.","ex":"The detective's questions were designed to elicit a confession."},{"word":"eloquent","def":"adj. fluent and persuasive in speech or writing.","ex":"Her eloquent defense of the proposal swayed even its harshest critics."},{"word":"emaciate","def":"v. to make abnormally thin or weak, especially through starvation.","ex":"Months of famine had emaciated the once-robust villagers."},{"word":"emancipate","def":"v. to set free from slavery, restraint, or control.","ex":"The proclamation emancipated millions who had been held in bondage."},{"word":"embellish","def":"v. to decorate or adorn; to add exaggerated details.","ex":"He tended to embellish his fishing stories with each retelling."},{"word":"embezzle","def":"v. to steal or misappropriate money entrusted to one's care.","ex":"The accountant embezzled funds from the company over several years."},{"word":"embolden","def":"v. to give courage or confidence to.","ex":"Early victories emboldened the rebels to attack the capital."},{"word":"emboss","def":"v. to carve or mold a raised design onto a surface.","ex":"The stationery was embossed with the family's elegant gold crest."},{"word":"embroider","def":"v. to decorate with needlework; to embellish a story with fanciful details.","ex":"He embroidered the tale until the modest catch became a giant marlin."},{"word":"eminent","def":"adj. highly distinguished or respected in a field.","ex":"An eminent historian was invited to deliver the keynote address."},{"word":"emollient","def":"adj. softening or soothing, especially to the skin; n. a softening agent.","ex":"The lotion's emollient ingredients soothed her chapped, irritated hands."},{"word":"empirical","def":"adj. based on observation or experiment rather than theory.","ex":"The hypothesis lacked empirical support from any controlled study."},{"word":"emulate","def":"v. to imitate, especially in order to equal or surpass.","ex":"Young athletes often emulate the champions they admire most."},{"word":"encomium","def":"n. a formal expression of high praise; a eulogy or tribute.","ex":"The retiring judge received an encomium praising his decades of fairness."},{"word":"encumber","def":"v. to burden, hinder, or weigh down.","ex":"Heavy debts encumbered the new business from its very first month."},{"word":"endemic","def":"adj. regularly found in or native to a particular place or group.","ex":"These orchids are endemic to a single misty mountain valley."},{"word":"enervate","def":"v. to drain of energy, strength, or vitality; to weaken.","ex":"The relentless heat enervated the soldiers on their long march."},{"word":"enfranchise","def":"v. to grant the right to vote or full citizenship privileges.","ex":"The amendment enfranchised women who had long been denied the ballot."},{"word":"engender","def":"v. to give rise to or bring about; to cause.","ex":"The reforms engendered fierce resistance among entrenched officials."},{"word":"engross","def":"v. to absorb the full attention of; to occupy completely.","ex":"The thriller so engrossed her that she missed her train stop."},{"word":"enhance","def":"v. to improve or increase the quality, value, or extent of.","ex":"Soft lighting enhanced the cozy atmosphere of the small cafe."},{"word":"enigma","def":"n. a person or thing that is mysterious or puzzling.","ex":"Despite years of study, the ancient script remains an enigma."},{"word":"ennoble","def":"v. to elevate in dignity or character; to make noble.","ex":"Acts of quiet sacrifice ennobled the otherwise ordinary man."},{"word":"ennui","def":"n. a feeling of weariness and dissatisfaction from boredom.","ex":"A deep ennui settled over the idle, pampered heir."},{"word":"ensconce","def":"v. to settle comfortably and securely; to hide or shelter.","ex":"She ensconced herself in an armchair with a thick novel and tea."},{"word":"entangle","def":"v. to twist together so as to trap; to involve in difficulties.","ex":"The deal entangled the firm in years of costly litigation."},{"word":"enthrall","def":"v. to capture the fascinated attention of; to captivate.","ex":"The magician's tricks enthralled the children for the entire show."},{"word":"entitlement","def":"n. a right to something; a belief that one deserves privileges.","ex":"His sense of entitlement made him expect promotions without earning them."},{"word":"entrap","def":"v. to catch in or as if in a trap; to lure into wrongdoing.","ex":"The sting operation entrapped several corrupt officials accepting bribes."},{"word":"entreat","def":"v. to ask earnestly or beg; to plead with.","ex":"She entreated the judge to show her brother mercy."},{"word":"enumerate","def":"v. to list or name things one by one.","ex":"The report enumerates every objection raised during the consultation."},{"word":"enunciate","def":"v. to pronounce clearly; to state or proclaim distinctly.","ex":"The actor enunciated every syllable so the back rows could hear."},{"word":"ephemeral","def":"adj. lasting a very short time; transient.","ex":"The beauty of the cherry blossoms is famously ephemeral."},{"word":"epicure","def":"n. a person with refined taste in food and drink; a connoisseur.","ex":"As an epicure, he could identify a wine's vintage by scent alone."},{"word":"epigram","def":"n. a concise, witty, and often paradoxical saying.","ex":"Wilde's epigram about temptation drew laughter from the entire room."},{"word":"epitomize","def":"v. to be a perfect example of; to embody.","ex":"Her tireless generosity epitomized the spirit of the charity."},{"word":"equable","def":"adj. calm and even-tempered; free from extreme variations.","ex":"His equable temperament kept the team steady during the crisis."},{"word":"equanimity","def":"n. calmness and composure, especially under stress.","ex":"She faced the harsh criticism with surprising equanimity."},{"word":"equitable","def":"adj. fair and impartial; just.","ex":"The mediator sought an equitable division of the shared property."},{"word":"equivocate","def":"v. to use ambiguous language to deceive or avoid commitment.","ex":"The official equivocated when reporters pressed him for a clear answer."},{"word":"erratic","def":"adj. irregular, unpredictable, or inconsistent in behavior.","ex":"The patient's erratic heartbeat alarmed the attending nurse."},{"word":"erroneous","def":"adj. incorrect; based on a mistake or false information.","ex":"The article was retracted after its central claim proved erroneous."},{"word":"ersatz","def":"adj. being an artificial and usually inferior substitute.","ex":"During the war, families brewed ersatz coffee from roasted acorns."},{"word":"erstwhile","def":"adj. former; in the past; adv. formerly.","ex":"His erstwhile rival is now his closest business partner."},{"word":"erudite","def":"adj. having or showing deep, extensive learning; scholarly.","ex":"The erudite professor peppered her lectures with obscure historical references."},{"word":"eschew","def":"v. to deliberately avoid or abstain from.","ex":"The monk chose to eschew all worldly comforts and possessions."},{"word":"esoteric","def":"adj. understood by only a small, specialized group; obscure.","ex":"His esoteric theories baffled everyone outside his narrow field."},{"word":"estimable","def":"adj. worthy of respect or admiration.","ex":"The estimable scholar was honored for a lifetime of careful research."},{"word":"estrange","def":"v. to alienate; to cause to become hostile or indifferent.","ex":"The bitter inheritance dispute estranged the once-close siblings."},{"word":"ethos","def":"n. the characteristic spirit, values, or beliefs of a group.","ex":"Collaboration is central to the startup's egalitarian ethos."},{"word":"eulogize","def":"v. to praise highly, especially in a formal speech for the dead.","ex":"The senator eulogized her late mentor at the crowded memorial service."},{"word":"eulogy","def":"n. a speech or piece of writing praising someone, often at a funeral.","ex":"His daughter delivered a moving eulogy celebrating his quiet generosity."},{"word":"euphemism","def":"n. a mild expression substituted for a harsh or blunt one.","ex":"\"Passed away\" is a common euphemism for died."},{"word":"euphonious","def":"adj. pleasing or sweet in sound; agreeable to the ear.","ex":"The choir's euphonious harmonies filled the cathedral with warmth."},{"word":"euphony","def":"n. pleasing, harmonious sound, especially in words.","ex":"The poem's euphony made it a delight to read aloud."},{"word":"evanescent","def":"adj. fleeting; quickly fading or vanishing.","ex":"The evanescent glow of the fireflies faded as dawn approached."},{"word":"evince","def":"v. to show or reveal clearly; to make evident.","ex":"Her steady hands evinced a calm she did not actually feel."},{"word":"exacerbate","def":"v. to make a problem or bad situation worse.","ex":"Ignoring the leak only exacerbated the damage to the ceiling."},{"word":"exacting","def":"adj. demanding great care, effort, or precision.","ex":"The exacting editor flagged every comma out of place."},{"word":"exasperate","def":"v. to irritate or annoy intensely; to provoke frustration.","ex":"The endless delays exasperated passengers stranded at the gate."},{"word":"excoriate","def":"v. to criticize severely; to strip or wear off the skin.","ex":"Reviewers excoriated the film for its lazy plot and wooden acting."},{"word":"excrete","def":"v. to expel or discharge waste matter from the body.","ex":"The kidneys excrete toxins that would otherwise harm the body."},{"word":"excruciate","def":"v. to inflict intense pain or mental anguish upon.","ex":"The infected tooth excruciated him until the dentist could see him."},{"word":"exculpate","def":"v. to clear from blame or guilt.","ex":"New evidence exculpated the man who had been wrongly convicted."},{"word":"excursive","def":"adj. tending to digress or wander from the main subject.","ex":"His excursive lectures rarely stayed on the announced topic."},{"word":"execrate","def":"v. to detest or loathe; to denounce or curse.","ex":"History execrates the tyrant for the atrocities he ordered."},{"word":"exhaustive","def":"adj. thorough and complete; covering all possibilities.","ex":"The committee conducted an exhaustive review of every applicant's file."},{"word":"exhilarate","def":"v. to make cheerful, lively, or excited; to invigorate.","ex":"The steep downhill ride exhilarated the cyclists racing toward the finish."},{"word":"exhort","def":"v. to urge strongly or earnestly; to encourage by appeal.","ex":"The coach exhorted his players to fight until the final whistle."},{"word":"exigent","def":"adj. requiring immediate action; demanding or urgent.","ex":"The flooding posed an exigent threat that forced an overnight evacuation."},{"word":"exonerate","def":"v. to clear from blame or accusation; absolve.","ex":"New DNA evidence exonerated the man after decades in prison."},{"word":"exorcise","def":"v. to drive out an evil spirit; to free from a troubling influence.","ex":"She wrote the memoir to exorcise the painful memories of her childhood."},{"word":"expedient","def":"adj. convenient and practical, though sometimes improper; n. an expedient.","ex":"Lying seemed expedient, but it ultimately destroyed his credibility."},{"word":"expiate","def":"v. to make amends for; to atone for guilt or wrongdoing.","ex":"He volunteered for years to expiate the harm he had caused."},{"word":"explicate","def":"v. to explain or analyze in detail; to make clear.","ex":"The professor explicated the dense poem line by line."},{"word":"explicit","def":"adj. stated clearly and in detail; leaving no doubt.","ex":"The contract gave explicit instructions about the delivery deadline."},{"word":"exponent","def":"n. a person who advocates or promotes an idea or theory.","ex":"She became a leading exponent of sustainable urban design."},{"word":"expostulate","def":"v. to reason earnestly with someone in protest or disagreement.","ex":"She expostulated with the clerk over the unfair surcharge."},{"word":"expurgate","def":"v. to remove objectionable material from a text before publication.","ex":"The editor expurgated the novel's most explicit passages for the school edition."},{"word":"extemporaneous","def":"adj. spoken or done without preparation; impromptu.","ex":"Her extemporaneous speech impressed the audience more than the scripted one."},{"word":"extemporize","def":"v. to improvise; to speak or perform without preparation.","ex":"When his notes blew away, the speaker had to extemporize the rest."},{"word":"extenuate","def":"v. to lessen the seriousness of an offense by partial excuse.","ex":"His youth and remorse extenuated the severity of the sentence."},{"word":"extol","def":"v. to praise highly or enthusiastically.","ex":"Critics extolled the debut album as a work of genius."},{"word":"extraneous","def":"adj. irrelevant or unrelated; coming from outside.","ex":"Edit out the extraneous details that distract from your argument."},{"word":"extrapolate","def":"v. to infer or estimate by extending known information.","ex":"Analysts extrapolate future sales from current quarterly trends."},{"word":"exult","def":"v. to rejoice greatly; to feel triumphant joy.","ex":"The fans exulted when their team scored the winning goal."},{"word":"facetious","def":"adj. treating serious matters with inappropriate or flippant humor.","ex":"His facetious reply annoyed the panel during the solemn hearing."},{"word":"facilitate","def":"v. to make an action or process easier; to assist.","ex":"A neutral mediator helped facilitate the stalled negotiations."},{"word":"faction","def":"n. a small dissenting group within a larger one.","ex":"A radical faction split from the party over the tax proposal."},{"word":"fallacious","def":"adj. based on a mistaken belief or faulty reasoning.","ex":"The argument rested on the fallacious assumption that all swans are white."},{"word":"fallow","def":"adj. left unplanted to restore fertility; inactive or unproductive.","ex":"After years of fallow creativity, she finally wrote another novel."},{"word":"fanatical","def":"adj. filled with excessive, uncritical zeal or enthusiasm.","ex":"His fanatical devotion to the team bordered on obsession."},{"word":"fanciful","def":"adj. imaginative or unrealistic; existing only in fantasy.","ex":"The child told a fanciful tale about a dragon living in the attic."},{"word":"fastidious","def":"adj. very attentive to detail; hard to please; meticulous.","ex":"The fastidious chef rejected any vegetable with the slightest blemish."},{"word":"fathom","def":"v. to understand deeply or work out after much thought.","ex":"I cannot fathom why anyone would refuse such a generous offer."},{"word":"fatuous","def":"adj. silly and pointless; foolishly self-satisfied.","ex":"His fatuous grin and empty remarks annoyed the serious panel."},{"word":"faultfinder","def":"n. a person who habitually complains or criticizes trivial matters.","ex":"The office faultfinder grumbled about everything from the coffee to the carpet."},{"word":"fawn","def":"v. to flatter or seek favor through obsequious behavior.","ex":"Courtiers would fawn over the king to win his favor."},{"word":"feasible","def":"adj. capable of being done or achieved; practical.","ex":"Engineers concluded the tunnel was technically feasible but prohibitively expensive."},{"word":"fecund","def":"adj. highly fertile or productive; prolific.","ex":"Her fecund imagination produced a new novel nearly every year."},{"word":"felicitous","def":"adj. well-chosen or apt; pleasingly suitable.","ex":"Her felicitous phrasing captured the mood perfectly."},{"word":"fervid","def":"adj. intensely passionate or enthusiastic; ardent.","ex":"The candidate's fervid supporters chanted his name all night."},{"word":"fetid","def":"adj. having an offensive, foul smell.","ex":"A fetid stench rose from the neglected garbage bins."},{"word":"fetter","def":"v. to restrain or confine; n. a chain or restraint.","ex":"Rigid regulations fettered the company's ability to innovate."},{"word":"fidelity","def":"n. faithfulness or loyalty; accuracy in reproduction.","ex":"The translation preserves the fidelity of the original poem's rhythm."},{"word":"figurative","def":"adj. using metaphor or symbolism rather than literal meaning.","ex":"When she said her heart broke, she spoke in figurative terms."},{"word":"finesse","def":"n. refined skill or tact; v. to handle with subtle skill.","ex":"The diplomat handled the delicate dispute with remarkable finesse."},{"word":"fitful","def":"adj. occurring in irregular bursts; not steady or continuous.","ex":"He got only fitful sleep, waking every hour during the storm."},{"word":"flag","def":"v. to weaken or lose vigor; to mark for attention.","ex":"The runners' energy began to flag in the final mile."},{"word":"fledgling","def":"adj. new and inexperienced; n. a young bird or beginner.","ex":"The fledgling company struggled to attract its first investors."},{"word":"fleeting","def":"adj. lasting only briefly; passing quickly.","ex":"She caught only a fleeting glimpse of the deer before it vanished."},{"word":"flippancy","def":"n. lack of seriousness; disrespectful levity.","ex":"Her flippancy during the funeral shocked the grieving relatives."},{"word":"florid","def":"adj. excessively ornate or flowery; ruddy in complexion.","ex":"The florid prose was so overdecorated that its meaning got lost."},{"word":"flout","def":"v. to openly disregard or defy a rule, law, or convention with contempt.","ex":"The reckless driver continued to flout traffic laws despite repeated fines."},{"word":"fluke","def":"n. an unlikely chance occurrence, especially a lucky one.","ex":"Winning the lottery twice was an extraordinary fluke."},{"word":"fluky","def":"adj. obtained by chance rather than skill; unreliable or unpredictable.","ex":"His fluky last-second goal won the match no one expected him to play in."},{"word":"fluster","def":"v. to make someone nervous, agitated, or confused.","ex":"The barrage of hostile questions began to fluster the inexperienced spokesman."},{"word":"foible","def":"n. a minor weakness or eccentricity in someone's character.","ex":"We learned to tolerate the professor's harmless foible of talking to his plants."},{"word":"foment","def":"v. to stir up or instigate trouble, rebellion, or discord.","ex":"Agitators tried to foment unrest among the already disgruntled factory workers."},{"word":"forage","def":"v. to search widely for food or provisions.","ex":"Squirrels forage for acorns to store before winter arrives."},{"word":"ford","def":"v. to cross a river at a shallow point; n. such a crossing.","ex":"The settlers had to ford the swollen stream before nightfall."},{"word":"forebear","def":"n. an ancestor; a person from whom one is descended.","ex":"She traced her forebears back to settlers who arrived three centuries ago."},{"word":"forebode","def":"v. to foretell or be an omen of, usually something bad.","ex":"The darkening sky seemed to forebode the storm that would ruin the harvest."},{"word":"foreshadow","def":"v. to indicate or suggest a future event in advance.","ex":"The ominous music foreshadowed the tragedy that would befall the hero."},{"word":"forestall","def":"v. to prevent or hinder by acting in advance.","ex":"The company cut prices to forestall a competitor's looming entry."},{"word":"forfeit","def":"v. to lose or give up something as a penalty for wrongdoing; n. a thing surrendered as a penalty","ex":"By missing the deadline, he was forced to forfeit his entire deposit."},{"word":"fortify","def":"v. to strengthen or reinforce a place, body, or position against attack or weakness","ex":"Engineers worked to fortify the levee before the rising river could breach it."},{"word":"fortuitous","def":"adj. happening by chance, especially a lucky or fortunate accident","ex":"Their fortuitous meeting at the airport led to a lifelong friendship."},{"word":"fracas","def":"n. a noisy disturbance, brawl, or quarrel.","ex":"Police were called to break up a fracas that erupted outside the bar."},{"word":"fractious","def":"adj. irritable and quarrelsome; difficult to control.","ex":"The fractious committee could not agree on even the smallest procedural matter."},{"word":"frenetic","def":"adj. wildly energetic, frantic, and uncontrolled in activity","ex":"The trading floor descended into frenetic shouting as prices began to plunge."},{"word":"fretful","def":"adj. anxious, irritable, or distressed.","ex":"The fretful child whimpered and squirmed throughout the long, tedious flight."},{"word":"friable","def":"adj. easily crumbled or reduced to powder.","ex":"The friable sandstone broke apart in her hands at the slightest pressure."},{"word":"fringe","def":"n. the outer or marginal edge of something; an unconventional minority group","ex":"His radical theories were dismissed as the work of a scientific fringe."},{"word":"frowsy","def":"adj. scruffy, unkempt, or musty in appearance or smell.","ex":"He shuffled in looking frowsy, his clothes rumpled from sleeping on the couch."},{"word":"frugal","def":"adj. economical and sparing in the use of money or resources","ex":"Her frugal habits let her save half her salary every month."},{"word":"fulminate","def":"v. to protest or denounce vehemently.","ex":"The senator continued to fulminate against the proposed tax for nearly an hour."},{"word":"fungible","def":"adj. interchangeable; able to replace or be replaced by an identical item.","ex":"Money is fungible, since any one dollar is worth exactly the same as another."},{"word":"furtive","def":"adj. done secretly and stealthily to avoid being noticed","ex":"He cast a furtive glance over his shoulder before slipping out the door."},{"word":"fusty","def":"adj. smelling stale or damp; old-fashioned and dull.","ex":"The fusty old library smelled of mildew and forgotten, crumbling books."},{"word":"futile","def":"adj. incapable of producing any useful result; pointless","ex":"Arguing with the stubborn official proved entirely futile."},{"word":"gadfly","def":"n. a persistent, provocative critic who annoys or goads others.","ex":"As a gadfly, she relentlessly questioned the council's every dubious decision."},{"word":"gainsay","def":"v. to deny, contradict, or speak against.","ex":"No one dared gainsay the evidence the prosecutor laid out so meticulously."},{"word":"galvanize","def":"v. to shock or excite into sudden action.","ex":"The tragic news galvanized the community into organizing immediate relief efforts."},{"word":"gambol","def":"v. to run or leap about playfully; n. a playful frolic.","ex":"Lambs gambol across the meadow each spring, kicking up their tiny heels."},{"word":"garble","def":"v. to distort or confuse a message so it is hard to understand.","ex":"The poor connection garbled his words into an unintelligible jumble."},{"word":"garner","def":"v. to gather, collect, or accumulate, especially support or information","ex":"The young senator managed to garner widespread support for her bill."},{"word":"garrulous","def":"adj. excessively talkative, especially about trivial matters.","ex":"Our garrulous neighbor cornered us for an hour recounting his every errand."},{"word":"gauche","def":"adj. socially awkward, tactless, or lacking grace","ex":"His gauche remark about her weight silenced the entire dinner table."},{"word":"gawky","def":"adj. awkward and clumsy, especially in physical movement.","ex":"The gawky teenager tripped over his own feet trying to reach his seat."},{"word":"germane","def":"adj. relevant and appropriate to the matter at hand.","ex":"The lawyer objected that the testimony was not germane to the case."},{"word":"gestation","def":"n. the process of developing inside the womb; the development of a plan or idea","ex":"The novel had a long gestation, taking nearly a decade to complete."},{"word":"gibe","def":"v. to mock or jeer; n. a taunting, insulting remark.","ex":"Rivals would gibe at him from the stands whenever he missed a shot."},{"word":"gild","def":"v. to cover with gold; to give a deceptively attractive appearance.","ex":"The con artist tried to gild the worthless scheme with promises of riches."},{"word":"gist","def":"n. the central or essential meaning of a speech or text","ex":"I missed the details, but I caught the gist of her argument."},{"word":"glacial","def":"adj. extremely slow; coldly unfriendly in manner","ex":"Negotiations proceeded at a glacial pace, dragging on for months."},{"word":"glib","def":"adj. fluent and persuasive but insincere or superficial","ex":"His glib answers convinced no one that he understood the problem."},{"word":"glisten","def":"v. to shine with a sparkling, wet, or reflected light.","ex":"Dewdrops glisten on the grass when the first morning sunlight strikes them."},{"word":"glower","def":"v. to stare angrily or sullenly; n. an angry stare.","ex":"The coach could only glower at the referee after the unfair penalty."},{"word":"glutinous","def":"adj. sticky, gluey, or gummy in texture.","ex":"The overcooked rice turned into a glutinous mass that stuck to the spoon."},{"word":"goad","def":"v. to provoke or prod someone into action; n. something that incites","ex":"Hecklers tried to goad the speaker into losing his temper."},{"word":"goggle","def":"v. to stare with wide, bulging eyes in amazement.","ex":"Tourists goggle at the towering skyscrapers as if they had never seen one."},{"word":"goldbrick","def":"v. to shirk work or duty; n. a lazy person who avoids work.","ex":"He would goldbrick all afternoon, hiding in the storeroom to avoid his tasks."},{"word":"goosebumps","def":"n. small bumps on the skin caused by cold, fear, or strong emotion","ex":"The haunting melody gave her goosebumps from the very first note."},{"word":"gouge","def":"v. to cut or scoop out roughly; to overcharge or swindle someone","ex":"Scalpers gouge desperate fans by tripling the ticket prices."},{"word":"gradation","def":"n. a gradual change or a series of small successive stages","ex":"The painting showed a subtle gradation from deep blue to pale gray."},{"word":"graft","def":"n. corruption involving misuse of office for gain; v. to join or transplant","ex":"The mayor resigned amid allegations of graft and bribery."},{"word":"grandiloquent","def":"adj. using pompous, lofty, or extravagant language.","ex":"His grandiloquent speech was full of grand phrases but said almost nothing."},{"word":"grandstand","def":"v. to behave showily to attract attention and admiration","ex":"The lawyer was accused of grandstanding for the cameras rather than serving his client."},{"word":"gratify","def":"v. to give pleasure or satisfaction; to indulge a desire.","ex":"It gratified her to see years of patient effort finally rewarded."},{"word":"grating","def":"adj. irritating or harsh, especi
